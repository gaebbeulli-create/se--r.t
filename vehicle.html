<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>차량 목록 | SE글로벌 렌탈 TEAMBRO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--bg2:#141414;--bg3:#1c1c1e;--bg4:#2c2c2e;--border:#2c2c2e;--border2:#3a3a3c;--text:#f5f5f7;--text2:#a1a1a6;--text3:#6e6e73;--teal:#a3e635;--accent:#0a84ff;--accent2:#30d158}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;padding-bottom:80px}
a{text-decoration:none;color:inherit}
header{background:rgba(10,10,10,.85);backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:100}
.hi{max-width:1200px;margin:0 auto;padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:52px}
.back-btn{font-size:13px;font-weight:600;color:var(--text2);cursor:pointer}
.back-btn:hover{color:var(--teal)}
.logo{display:flex;align-items:center}
.logo .se{color:#ff2d2d;font-weight:900;font-size:17px;font-style:italic}
.logo .gl{color:#fff;font-weight:900;font-size:17px}
.logo .x{color:rgba(255,255,255,.3);font-weight:300;font-size:13px;margin:0 6px}
.logo .tb{color:#00ffb3;font-weight:900;font-size:17px}
.hcta{background:var(--teal);color:#0a0a0a;padding:7px 16px;border-radius:980px;font-size:13px;font-weight:700}

/* Filter bar */
.filter-bar{background:var(--bg2);border-bottom:0.5px solid var(--border);padding:12px 22px;position:sticky;top:52px;z-index:90}
.filter-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:8px;overflow-x:auto;scrollbar-width:none}
.filter-inner::-webkit-scrollbar{display:none}
.ftag{background:var(--bg3);border:0.5px solid var(--border2);color:var(--text2);padding:6px 14px;border-radius:980px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;transition:all .2s}
.ftag:hover,.ftag.on{background:var(--teal);color:#0a0a0a;border-color:var(--teal)}

/* Page hero */
.page-hero{max-width:1200px;margin:0 auto;padding:40px 22px 28px}
.page-hero h1{font-size:clamp(24px,4vw,40px);font-weight:900;letter-spacing:-1px;margin-bottom:6px}
.page-hero p{font-size:14px;color:var(--text2)}

/* Vehicle grid */
.vgrid-wrap{max-width:1200px;margin:0 auto;padding:0 22px 40px}
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.vcard{background:var(--bg2);border:0.5px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .25s,box-shadow .25s,border-color .25s}
.vcard:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.5);border-color:var(--teal)}
.vcard-img{width:100%;aspect-ratio:1;overflow:hidden;background:var(--bg3);position:relative}
.vcard-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .4s}
.vcard:hover .vcard-img img{transform:scale(1.04)}
.vcard-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:56px;background:var(--bg4)}
.vbadge{position:absolute;top:10px;left:10px;background:rgba(163,230,53,.15);border:0.5px solid rgba(163,230,53,.3);color:var(--teal);padding:3px 9px;border-radius:980px;font-size:10px;font-weight:700;z-index:2}
.vcard-body{padding:16px 18px 18px}
.vcard-type{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
.vcard-type.ev{color:var(--accent2)}
.vcard-name{font-size:18px;font-weight:700;margin-bottom:3px;letter-spacing:-.3px}
.vcard-tag{font-size:12px;color:var(--text3);margin-bottom:14px}
.vcard-prices{display:flex;gap:12px;padding-top:12px;border-top:0.5px solid var(--border2)}
.vcard-price-item{display:flex;flex-direction:column;gap:2px}
.vcard-pl{font-size:10px;color:var(--text3)}
.vcard-pv{font-size:16px;font-weight:700;color:var(--teal)}
.vcard-pv.small{font-size:13px;color:var(--text2)}

/* Loading */
.loading{text-align:center;padding:80px 20px;color:var(--text3)}
.spin{width:24px;height:24px;border:1.5px solid var(--border2);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Empty */
.empty{text-align:center;padding:80px 20px}

/* Mobile CTA */
.mcta{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,.9);backdrop-filter:blur(20px);border-top:0.5px solid var(--border);padding:10px 16px;z-index:200;grid-template-columns:1fr 1fr;gap:8px}
.mb{padding:12px;border-radius:12px;font-size:14px;font-weight:700;text-align:center;border:none;cursor:pointer;font-family:inherit}
.mp{background:var(--teal);color:#0a0a0a}
.mk{background:#FEE500;color:#1d1d1f}

@media(max-width:768px){.vgrid{grid-template-columns:repeat(2,1fr);gap:10px}body{padding-bottom:72px}.mcta{display:grid}}
@media(max-width:400px){.vgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<script>
const SB_URL='https://ogjrhphhpqpzlzlbugdp.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nanJocGhocHFwemx6bGJ1Z2RwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2Mjc4MzUsImV4cCI6MjA4OTIwMzgzNX0.tdVzi9swRk_sKbNqFvIMg30q5XcgDXRfVJitPNCFRA8';
const sb=supabase.createClient(SB_URL,SB_KEY);
</script>
<header>
  <div class="hi">
    <a href="index.html" class="back-btn">← 홈으로</a>
    <a href="index.html" class="logo"><span class="se">SE</span><span class="gl">GLOBAL</span><span class="x">×</span><span class="tb">TEAMBRO</span></a>
    <a href="index.html#consult" class="hcta">상담 신청</a>
  </div>
</header>
<div class="filter-bar">
  <div class="filter-inner">
    <div class="ftag on" onclick="filterV('all',this)">전체</div>
    <div class="ftag" onclick="filterV('electric',this)">⚡ 전기이륜차</div>
    <div class="ftag" onclick="filterV('gasoline',this)">⛽ 내연기관</div>
  </div>
</div>
<div class="page-hero">
  <h1>전체 차량 라인업</h1>
  <p id="vcount">차량을 불러오는 중...</p>
</div>
<div class="vgrid-wrap">
  <div class="vgrid" id="vgrid"><div class="loading"><div class="spin"></div>불러오는 중...</div></div>
</div>
<div class="mcta">
  <button class="mb mp" id="mPhone">📞 전화 상담</button>
  <button class="mb mk" id="mKakao">💬 카카오톡</button>
</div>
<script>
let allVehicles=[];
let curFilter='all';
async function init(){
  try{
    const{data:rows}=await sb.from('site_config').select('phone,kakao_url').eq('id',1).limit(1);
    const s=rows&&rows.length?rows[0]:null;
    if(s){
      if(s.phone){['mPhone'].forEach(id=>{const el=document.getElementById(id);if(el)el.onclick=()=>location.href='tel:'+s.phone;});document.getElementById('mPhone').textContent='📞 '+s.phone;}
      if(s.kakao_url){['mKakao'].forEach(id=>{const el=document.getElementById(id);if(el)el.onclick=()=>window.open(s.kakao_url,'_blank');});}
    }
  }catch(e){}
  try{
    const{data,error}=await sb.from('vehicles').select('*').order('sort_order',{ascending:true});
    if(error)throw error;
    allVehicles=data||[];
    renderVehicles();
  }catch(e){document.getElementById('vgrid').innerHTML='<div class="empty"><p style="color:var(--text3)">차량을 불러올 수 없습니다</p></div>';}
}
function filterV(type,el){
  curFilter=type;
  document.querySelectorAll('.ftag').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  renderVehicles();
}
function renderVehicles(){
  const filtered=curFilter==='all'?allVehicles:allVehicles.filter(v=>v.type===curFilter);
  const grid=document.getElementById('vgrid');
  const cnt=document.getElementById('vcount');
  cnt.textContent=`총 ${filtered.length}개 차량`;
  if(!filtered.length){grid.innerHTML='<div class="empty"><p style="color:var(--text3)">해당 조건의 차량이 없습니다</p></div>';return;}
  grid.innerHTML=filtered.map(v=>{
    const imgs=Array.isArray(v.images)?v.images:(typeof v.images==='string'?JSON.parse(v.images||'[]'):[]);
    const main=imgs.find(x=>x.is_main)||imgs[0];
    const imgEl=main?`<img src="${main.url}" alt="${v.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=vcard-ph>${v.type==='electric'?'⚡':'🏍️'}</div>'">`:`<div class="vcard-ph">${v.type==='electric'?'⚡':'🏍️'}</div>`;
    return `<div class="vcard" onclick="location.href='vehicle.html?id=${v.id}'">
      ${v.badge?`<div class="vbadge">${v.badge}</div>`:''}
      <div class="vcard-img">${imgEl}</div>
      <div class="vcard-body">
        <div class="vcard-type ${v.type==='electric'?'ev':''}">${v.type==='electric'?'ELECTRIC':'GASOLINE'}</div>
        <div class="vcard-name">${v.name}</div>
        <div class="vcard-tag">${v.tagline||''}</div>
        <div class="vcard-prices">
          <div class="vcard-price-item"><div class="vcard-pl">렌탈</div><div class="vcard-pv">${v.rental_price||'문의'}</div></div>
          ${v.lease_price?`<div class="vcard-price-item"><div class="vcard-pl">리스</div><div class="vcard-pv small">${v.lease_price}</div></div>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}
// URL 파라미터로 필터 자동 적용
const urlType=new URLSearchParams(location.search).get('type');
if(urlType){
  const tags=document.querySelectorAll('.ftag');
  tags.forEach(t=>t.classList.remove('on'));
  if(urlType==='electric'){
    document.querySelectorAll('.ftag')[1].classList.add('on');
    curFilter='electric';
  } else if(urlType==='gasoline'){
    document.querySelectorAll('.ftag')[2].classList.add('on');
    curFilter='gasoline';
  }
}
init();
</script>
</body>
</html>
