<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>차량 상세 - SE글로벌 렌탈</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#2563EB;--accent:#F59E0B;--text:#1E293B;--sub:#64748B;--bg:#F8FAFC;--card:#fff;--border:#E2E8F0;--green:#10B981}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);padding-bottom:80px}
a{text-decoration:none;color:inherit}
header{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:0 20px}
.hi{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:16px;height:60px}
.back{font-size:14px;font-weight:600;color:var(--sub);cursor:pointer}
.logo{font-size:20px;font-weight:800;color:var(--primary)}.logo span{color:var(--accent)}
.gallery{background:#000;position:relative;overflow:hidden}
.gmain{width:100%;height:min(60vw,420px);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.gmain img{width:100%;height:100%;object-fit:contain;cursor:zoom-in}
.gph{font-size:100px;opacity:.3}
.garr{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.garr.prev{left:12px}.garr.next{right:12px}
.gctr{position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,.5);color:#fff;padding:4px 10px;border-radius:20px;font-size:12px}
.gthumbs{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;background:#111;scrollbar-width:none}
.gthumbs::-webkit-scrollbar{display:none}
.gthumb{width:56px;height:56px;border-radius:6px;overflow:hidden;cursor:pointer;flex-shrink:0;border:2px solid transparent}
.gthumb.on{border-color:var(--primary)}
.gthumb img{width:100%;height:100%;object-fit:cover}
.content{max-width:1100px;margin:0 auto;padding:20px}
.vtype{font-size:12px;font-weight:700;color:var(--primary);margin-bottom:4px}
.vname{font-size:26px;font-weight:900;margin-bottom:6px}
.vtag{font-size:15px;color:var(--sub);margin-bottom:16px}
.pcard{background:var(--card);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.prow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pbox{text-align:center;padding:16px;border-radius:12px;background:var(--bg)}
.pbox.hi{background:#EFF6FF}
.ptag{font-size:12px;font-weight:700;color:var(--sub);margin-bottom:4px}
.pval{font-size:24px;font-weight:900;color:var(--primary)}
.psub{font-size:11px;color:var(--sub);margin-top:2px}
.deprow{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:13px}
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:20px}
.tab{padding:12px 20px;font-size:14px;font-weight:700;color:var(--sub);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.on{color:var(--primary);border-bottom-color:var(--primary)}
.tc{display:none}.tc.on{display:block}
.stbl{width:100%;border-collapse:collapse}
.stbl tr{border-bottom:1px solid var(--border)}
.stbl td{padding:12px 4px;font-size:14px}
.stbl td:first-child{color:var(--sub);width:40%}
.stbl td:last-child{font-weight:700}
.desc{font-size:14px;line-height:1.8}
/* lightbox */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1000;align-items:center;justify-content:center}
.lb.on{display:flex}
.lb img{max-width:95vw;max-height:90vh;object-fit:contain}
.lbclose{position:absolute;top:16px;right:16px;background:none;border:none;color:#fff;font-size:32px;cursor:pointer}
.lbarr{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;width:48px;height:48px;border-radius:50%;font-size:20px;cursor:pointer}
.lbarr.prev{left:16px}.lbarr.next{right:16px}
.mcta{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:10px 16px;z-index:200;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mcbtn{padding:13px;border-radius:10px;font-size:14px;font-weight:800;text-align:center;border:none;cursor:pointer}
.mph{background:var(--primary);color:#fff}
.mkk{background:#FEE500;color:#3A1D1D}
.lwrap{text-align:center;padding:80px 20px}
.spin{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.ewrap{text-align:center;padding:80px 20px}
</style>
</head>
<body>
<script>
const SB_URL='https://ogjrhphhpqpzlzlbugdp.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nanJocGhocHFwemx6bGJ1Z2RwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2Mjc4MzUsImV4cCI6MjA4OTIwMzgzNX0.tdVzi9swRk_sKbNqFvIMg30q5XcgDXRfVJitPNCFRA8';
const sb=supabase.createClient(SB_URL,SB_KEY);
</script>

<header>
  <div class="hi">
    <div class="back" onclick="history.back()">← 목록</div>
    <a href="index.html" class="logo">SE글로벌 <span>렌탈</span></a>
  </div>
</header>

<div id="lwrap" class="lwrap"><div class="spin"></div><p style="color:var(--sub)">차량 정보를 불러오는 중...</p></div>
<div id="ewrap" class="ewrap" style="display:none">
  <div style="font-size:60px;margin-bottom:16px">🤔</div>
  <h2 style="font-size:20px;font-weight:800;margin-bottom:8px">차량을 찾을 수 없습니다</h2>
  <p style="color:var(--sub);margin-bottom:24px">URL을 확인하거나 목록으로 돌아가세요</p>
  <a href="index.html" style="background:var(--primary);color:#fff;padding:12px 24px;border-radius:10px;font-weight:700">목록으로</a>
</div>

<div id="main" style="display:none">
  <div class="gallery">
    <div class="gmain" id="gmain"><div class="gph">🛵</div></div>
    <div class="gthumbs" id="gthumbs"></div>
  </div>
  <div class="content">
    <div style="margin-bottom:20px">
      <div class="vtype" id="vtype"></div>
      <h1 class="vname" id="vname"></h1>
      <p class="vtag" id="vtag"></p>
    </div>
    <div class="pcard">
      <div class="prow">
        <div class="pbox hi"><div class="ptag">🛵 렌탈</div><div class="pval" id="prental">-</div><div class="psub">/월</div></div>
        <div class="pbox"><div class="ptag">📋 리스</div><div class="pval" id="please">-</div><div class="psub">/월</div></div>
      </div>
      <div class="deprow"><span style="color:var(--sub)">보증금</span><span style="font-weight:700" id="pdep">상담 문의</span></div>
      <p style="font-size:11px;color:#94A3B8;margin-top:8px">※ 정확한 요금은 상담 후 확정됩니다</p>
    </div>
    <div class="tabs">
      <button class="tab on" onclick="switchTab('spec',this)">제원</button>
      <button class="tab" onclick="switchTab('desc',this)">상세 설명</button>
    </div>
    <div class="tc on" id="tc-spec"><table class="stbl" id="stbl"></table></div>
    <div class="tc" id="tc-desc"><p class="desc" id="desctext"></p></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:32px">
      <button id="pcPhone" style="padding:16px;border-radius:12px;background:var(--primary);color:#fff;font-size:15px;font-weight:800;border:none;cursor:pointer">📞 전화 상담</button>
      <button id="pcKakao" style="padding:16px;border-radius:12px;background:#FEE500;color:#3A1D1D;font-size:15px;font-weight:800;border:none;cursor:pointer">💬 카카오톡</button>
    </div>
    <p style="font-size:11px;color:#94A3B8;line-height:1.6;margin-top:20px;padding:12px;background:#F8FAFC;border-radius:8px">※ 본 페이지는 특정 제조사의 공식 페이지가 아닙니다. 차량 사양 및 가격은 변경될 수 있습니다.</p>
  </div>
</div>

<div class="lb" id="lb" onclick="closeLb()">
  <button class="lbclose" onclick="closeLb()">✕</button>
  <button class="lbarr prev" onclick="event.stopPropagation();moveLb(-1)">‹</button>
  <img id="lbimg" src="" alt="" onclick="event.stopPropagation()">
  <button class="lbarr next" onclick="event.stopPropagation();moveLb(1)">›</button>
</div>

<div class="mcta">
  <button class="mcbtn mph" id="mPhone">📞 전화 상담</button>
  <button class="mcbtn mkk" id="mKakao">💬 카카오톡</button>
</div>

<script>
let imgs=[],cur=0;
const vid=new URLSearchParams(location.search).get('id');

async function init(){
  if(!vid){showErr();return;}
  try{
    const {data,error}=await sb.from('vehicles').select('*').eq('id',vid).limit(1);
    if(error||!data||!data.length)throw new Error('not found');
    const v=data[0];
    document.title=`${v.name} - SE글로벌 렌탈`;
    document.getElementById('vtype').textContent=v.type==='electric'?'⚡ 전기이륜차':'⛽ 내연기관';
    document.getElementById('vname').textContent=v.name;
    document.getElementById('vtag').textContent=v.tagline||'';
    document.getElementById('prental').textContent=v.rental_price||'문의';
    document.getElementById('please').textContent=v.lease_price||'문의';
    document.getElementById('pdep').textContent=v.deposit||'상담 문의';
    document.getElementById('desctext').textContent=v.description||'상세 설명이 준비 중입니다.';
    // specs
    let specs={};
    if(v.specs){try{specs=typeof v.specs==='string'?JSON.parse(v.specs):v.specs;}catch(e){}}
    const rows=Object.entries(specs).map(([k,val])=>`<tr><td>${k}</td><td>${val}</td></tr>`).join('');
    document.getElementById('stbl').innerHTML=rows||'<tr><td colspan="2" style="text-align:center;color:#94A3B8;padding:24px">제원 정보가 없습니다</td></tr>';
    // images
    try{imgs=typeof v.images==='string'?JSON.parse(v.images):(Array.isArray(v.images)?v.images:[]);}catch(e){imgs=[];}
    buildGallery();
    // site config for CTAs
    loadCTA();
    document.getElementById('lwrap').style.display='none';
    document.getElementById('main').style.display='block';
  }catch(e){showErr();}
}

function showErr(){document.getElementById('lwrap').style.display='none';document.getElementById('ewrap').style.display='block';}

function buildGallery(){
  const gm=document.getElementById('gmain');
  const gt=document.getElementById('gthumbs');
  if(!imgs.length)return;
  cur=Math.max(0,imgs.findIndex(i=>i.is_main));
  gm.innerHTML=`<img id="mimg" src="${imgs[cur].url}" alt="차량 이미지" onclick="openLb(${cur})">${imgs.length>1?`<button class="garr prev" onclick="moveG(-1)">‹</button><button class="garr next" onclick="moveG(1)">›</button><div class="gctr" id="gctr">1/${imgs.length}</div>`:''}`;
  if(imgs.length>1)gt.innerHTML=imgs.map((img,i)=>`<div class="gthumb ${i===cur?'on':''}" onclick="goG(${i})"><img src="${img.url}" alt=""></div>`).join('');
}
function moveG(d){cur=(cur+d+imgs.length)%imgs.length;updateG();}
function goG(i){cur=i;updateG();}
function updateG(){
  const mi=document.getElementById('mimg');if(mi)mi.src=imgs[cur].url;
  const ct=document.getElementById('gctr');if(ct)ct.textContent=`${cur+1}/${imgs.length}`;
  document.querySelectorAll('.gthumb').forEach((t,i)=>t.classList.toggle('on',i===cur));
}
function openLb(i){cur=i;document.getElementById('lbimg').src=imgs[i].url;document.getElementById('lb').classList.add('on');}
function closeLb(){document.getElementById('lb').classList.remove('on');}
function moveLb(d){cur=(cur+d+imgs.length)%imgs.length;document.getElementById('lbimg').src=imgs[cur].url;updateG();}
function switchTab(id,btn){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));document.querySelectorAll('.tc').forEach(c=>c.classList.remove('on'));btn.classList.add('on');document.getElementById('tc-'+id).classList.add('on');}
document.addEventListener('keydown',e=>{if(document.getElementById('lb').classList.contains('on')){if(e.key==='ArrowLeft')moveLb(-1);if(e.key==='ArrowRight')moveLb(1);if(e.key==='Escape')closeLb();}});

async function loadCTA(){
  try{
    const {data:rows}=await sb.from('site_config').select('phone,kakao_url').eq('id',1).limit(1);
    const s=rows&&rows.length?rows[0]:null;
    if(!s)return;
    if(s.phone){['pcPhone','mPhone'].forEach(id=>{const el=document.getElementById(id);if(el){el.onclick=()=>location.href='tel:'+s.phone;if(id==='mPhone')el.textContent='📞 '+s.phone;}});}
    if(s.kakao_url){['pcKakao','mKakao'].forEach(id=>{const el=document.getElementById(id);if(el)el.onclick=()=>window.open(s.kakao_url,'_blank');});}
  }catch(e){}
}
init();
</script>
</body>
</html>
