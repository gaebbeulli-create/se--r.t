<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>차량 상세 - SE글로벌 렌탈</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--bg2:#111;--bg3:#181818;--bg4:#222;
  --border:#1e1e1e;--border2:#2a2a2a;
  --text:#f0f0f0;--text2:#888;--text3:#444;
  --teal:#a3e635;--accent:#0a84ff;--red:#ff453a;
}
html{scroll-behavior:smooth}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}

/* ── Header ── */
header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:56px;padding:0 24px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(8,8,8,.85);backdrop-filter:blur(24px);
  border-bottom:0.5px solid rgba(255,255,255,.05);
}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;transition:color .2s}
.back-btn:hover{color:var(--teal)}
.logo{font-size:14px;font-weight:800}
.logo .se{color:#ff2d2d;font-style:italic}
.logo .gl{color:#fff}
.logo .x{color:rgba(255,255,255,.25);font-weight:300;margin:0 3px}
.logo .tb{color:#00ffb3}
.hbtn{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .2s}
.hbtn:hover{background:var(--bg4);border-color:var(--teal)}

/* ── PC Layout: 2-column ── */
.page-wrap{
  margin-top:56px;
  display:grid;
  grid-template-columns:1fr 1fr;
  min-height:calc(100vh - 56px);
  max-width:1400px;
  margin-left:auto;margin-right:auto;
}

/* ── Left: Gallery (sticky) ── */
.gallery-col{
  position:sticky;top:56px;
  height:calc(100vh - 56px);
  display:flex;flex-direction:column;
  overflow:hidden;
  background:var(--bg2);
}
.gallery-main{
  flex:1;position:relative;overflow:hidden;
  background:var(--bg2);cursor:zoom-in;
}
.gallery-main img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:center;transition:transform .5s ease;
}
.gallery-main:hover img{transform:scale(1.03)}
.gallery-main-ph{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:100px;background:linear-gradient(135deg,#111,#1a1a1a);
}
.gallery-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.5) 0%,transparent 40%);
  pointer-events:none;z-index:1;
}
.gallery-badge{
  position:absolute;top:20px;left:20px;z-index:2;
  background:rgba(163,230,53,.15);border:0.5px solid rgba(163,230,53,.4);
  color:var(--teal);font-size:10px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  padding:5px 12px;border-radius:980px;
}
.gallery-badge.gas{background:rgba(10,132,255,.15);border-color:rgba(10,132,255,.4);color:var(--accent)}
.garr{
  position:absolute;top:50%;transform:translateY(-50%);z-index:2;
  width:42px;height:42px;border-radius:50%;
  background:rgba(0,0,0,.6);backdrop-filter:blur(10px);
  border:0.5px solid rgba(255,255,255,.12);
  color:#fff;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.garr:hover{background:rgba(163,230,53,.2);border-color:var(--teal);color:var(--teal)}
.garr.prev{left:16px}.garr.next{right:16px}
.gctr{
  position:absolute;bottom:16px;right:16px;z-index:2;
  background:rgba(0,0,0,.65);color:#fff;
  padding:4px 10px;border-radius:980px;font-size:11px;font-weight:600;
  border:0.5px solid rgba(255,255,255,.1);
}
.gthumbs{
  display:flex;height:72px;background:var(--bg);
  border-top:0.5px solid var(--border);overflow-x:auto;scrollbar-width:none;flex-shrink:0;
}
.gthumbs::-webkit-scrollbar{display:none}
.gthumb{
  flex:0 0 72px;height:72px;cursor:pointer;overflow:hidden;
  opacity:.4;transition:opacity .2s;position:relative;
}
.gthumb.on{opacity:1}
.gthumb::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--teal);opacity:0;transition:opacity .2s}
.gthumb.on::after{opacity:1}
.gthumb img{width:100%;height:100%;object-fit:contain;background:var(--bg2)}

/* ── Right: Info ── */
.info-col{
  overflow-y:auto;
  padding:40px 48px 120px;
  border-left:0.5px solid var(--border);
  height:calc(100vh - 56px);
  scrollbar-width:thin;scrollbar-color:var(--bg4) transparent;
}
.info-col::-webkit-scrollbar{width:4px}
.info-col::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

/* Vehicle name section */
.v-eyebrow{
  font-size:11px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--teal);margin-bottom:10px;
}
.v-name{
  font-size:clamp(28px,3vw,44px);font-weight:900;
  letter-spacing:-1.5px;line-height:1.05;margin-bottom:10px;
}
.v-tag{font-size:16px;color:var(--text2);line-height:1.5;margin-bottom:32px}

/* Price */
.price-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px}
.price-card{
  background:var(--bg2);border:0.5px solid var(--border2);
  border-radius:16px;padding:20px;
  transition:border-color .2s,background .2s;
}
.price-card:hover{border-color:var(--border2);background:var(--bg3)}
.price-card.feat{
  background:linear-gradient(135deg,rgba(163,230,53,.1) 0%,rgba(163,230,53,.03) 100%);
  border-color:rgba(163,230,53,.25);
}
.pc-label{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:6px;letter-spacing:.5px}
.price-card.feat .pc-label{color:rgba(163,230,53,.6)}
.pc-val{font-size:28px;font-weight:900;color:var(--teal);letter-spacing:-1px}
.price-card:not(.feat) .pc-val{color:var(--text)}
.pc-unit{font-size:12px;color:var(--text3);margin-top:2px}
.price-note{font-size:11px;color:var(--text3);margin-bottom:28px;padding-top:8px}

/* CTA buttons */
.cta-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:32px}
.cta-btn{
  padding:16px;border-radius:14px;font-size:15px;font-weight:700;
  border:none;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s;
}
.cta-phone{background:var(--teal);color:#080808}
.cta-phone:hover{opacity:.85;transform:translateY(-2px);box-shadow:0 8px 24px rgba(163,230,53,.3)}
.cta-kakao{background:#FEE500;color:#1a1a00}
.cta-kakao:hover{opacity:.85;transform:translateY(-2px);box-shadow:0 8px 24px rgba(254,229,0,.2)}

/* Divider */
.divider{height:0.5px;background:var(--border);margin:28px 0}

/* Info blocks */
.info-block{margin-bottom:32px}
.info-block-head{
  display:flex;align-items:center;gap:10px;margin-bottom:16px;
}
.info-icon{
  width:30px;height:30px;border-radius:8px;
  background:rgba(163,230,53,.08);border:0.5px solid rgba(163,230,53,.15);
  display:flex;align-items:center;justify-content:center;font-size:14px;
}
.info-title{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--teal)}

/* Spec grid */
.spec-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.spec-item{
  background:var(--bg2);border:0.5px solid var(--border2);
  border-radius:12px;padding:14px;
  transition:border-color .2s;
}
.spec-item:hover{border-color:var(--border2)}
.spec-key{font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:500}
.spec-val{font-size:15px;font-weight:700}

/* Description */
.desc-text{font-size:15px;line-height:1.85;color:var(--text2);white-space:pre-line}

/* Notice */
.notice{
  background:rgba(255,214,10,.03);border:0.5px solid rgba(255,214,10,.1);
  border-radius:12px;padding:14px 16px;
  font-size:11px;color:var(--text3);line-height:1.6;margin-top:12px;
}

/* Mobile CTA (fixed bottom) */
.mcta{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(8,8,8,.92);backdrop-filter:blur(20px);
  border-top:0.5px solid var(--border);
  padding:10px 20px;z-index:200;
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
}
.mb{padding:13px;border-radius:12px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:inherit;text-align:center}
.mp{background:var(--teal);color:#080808}
.mk{background:#FEE500;color:#1a1a00}

/* Lightbox */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:1000;align-items:center;justify-content:center}
.lb.on{display:flex}
.lb img{max-width:100vw;max-height:100vh;object-fit:contain}
.lbc{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:20px;cursor:pointer;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.lba{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lba.prev{left:12px}.lba.next{right:12px}

/* Loading/Error */
.lwrap{margin-top:56px;text-align:center;padding:120px 20px}
.spin{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.ewrap{margin-top:56px;text-align:center;padding:120px 20px}

/* Scroll animations */
.anim{opacity:0;transform:translateY(16px);transition:opacity .5s ease,transform .5s ease}
.anim.in{opacity:1;transform:translateY(0)}
.d1{transition-delay:.05s}.d2{transition-delay:.1s}.d3{transition-delay:.15s}.d4{transition-delay:.2s}.d5{transition-delay:.25s}

/* ── Mobile: stack layout ── */
@media(max-width:900px){
  .page-wrap{
    grid-template-columns:1fr;
    margin-top:56px;
  }
  .gallery-col{
    position:relative;top:0;
    height:auto;
  }
  .gallery-main{aspect-ratio:1;height:auto}
  .info-col{
    height:auto;overflow-y:visible;
    padding:28px 20px 100px;
    border-left:none;
    border-top:0.5px solid var(--border);
  }
  .v-name{font-size:28px}
  .pc-val{font-size:24px}
  .spec-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>

<script>
const SB_URL='https://ogjrhphhpqpzlzlbugdp.supabase.co';

const sb=supabase.createClient(SB_URL,SB_KEY);

<header>
  <div class="back-btn" onclick="history.back()">← 목록</div>
  <div class="logo"><span class="se">SE</span><span class="gl">GLOBAL</span><span class="x">×</span><span class="tb">TEAMBRO</span></div>

<div id="lwrap" class="lwrap"><div class="spin"></div><p style="font-size:13px;color:var(--text3)">불러오는 중...</p></div>

  <a href="index.html" style="background:var(--teal);color:#080808;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700">목록으로</a>

<div id="main" class="page-wrap" style="display:none">
  <!-- 왼쪽: 갤러리 -->
  <div class="gallery-col">
    <div class="gallery-main" id="gmain">
      <div class="gallery-main-ph">🏍️</div>
      <div class="gallery-overlay"></div>
      <div class="gallery-badge" id="gBadge">⚡ ELECTRIC</div>
    </div>
    <div class="gthumbs" id="gthumbs"></div>
  </div>

  <!-- 오른쪽: 정보 -->
  <div class="info-col">
    <div class="v-eyebrow anim" id="vEye">SE글로벌 렌탈 TEAMBRO</div>
    <div class="v-name anim d1" id="vName">로딩 중...</div>
    <div class="v-tag anim d2" id="vTag"></div>

    <!-- 가격 -->
    <div class="price-row anim d2">
      <div class="price-card feat">
        <div class="pc-label">🛵 렌탈</div>
        <div class="pc-val" id="pR">-</div>
        <div class="pc-unit">/ 월</div>
      </div>
      <div class="price-card">

      </div>

      <button class="cta-btn cta-phone" id="pcP">📞 전화 상담</button>
      <button class="cta-btn cta-kakao" id="pcK">💬 카카오톡</button>
    </div>

    <div class="divider anim d3"></div>

    <!-- 제원 -->
    <div class="info-block anim d4">
      <div class="info-block-head">
        <div class="info-icon">📐</div>
        <div class="info-title">제원 정보</div>
      </div>
      <div class="spec-grid" id="specG"></div>
    </div>

    <div class="divider anim d4"></div>

    <!-- 설명 -->
    <div class="info-block anim d5">
      <div class="info-block-head">
        <div class="info-icon">📝</div>
        <div class="info-title">상세 설명</div>
      </div>
      <p class="desc-text" id="descT">상세 설명이 준비 중입니다.</p>
    </div>

    <div class="notice anim d5">※ 본 페이지는 특정 제조사의 공식 페이지가 아닙니다. 차량 사양 및 가격은 변경될 수 있으며, 정확한 내용은 상담을 통해 확인하시기 바랍니다.</div>
  </div>
</div>

<!-- Lightbox -->
<div class="lb" id="lb" onclick="closeLb()">
  <button class="lbc" onclick="closeLb()">✕</button>
  <button class="lba prev" onclick="event.stopPropagation();moveLb(-1)">‹</button>
  <img id="lbimg" src="" alt="" onclick="event.stopPropagation()">
  <button class="lba next" onclick="event.stopPropagation();moveLb(1)">›</button>
</div>

<div class="mcta">
  <button class="mb mp" id="mP">📞 전화 상담</button>
  <button class="mb mk" id="mK">💬 카카오톡</button>
</div>

<script>
let imgs=[],cur=0;
const vid=new URLSearchParams(location.search).get('id');

async function init(){
  if(!vid){showErr();return;}
  try{
    const{data,error}=await sb.from('vehicles').select('*').eq('id',vid).limit(1);
    if(error||!data||!data.length)throw new Error();
    const v=data[0];
    document.title=v.name+' | SE글로벌 렌탈 TEAMBRO';

    const isEv=v.type==='electric';
    const badge=document.getElementById('gBadge');
    badge.textContent=isEv?'⚡ ELECTRIC':'⛽ GASOLINE';
    if(!isEv)badge.classList.add('gas');

    document.getElementById('vEye').textContent=isEv?'전기이륜차 · SE글로벌 렌탈':'내연기관 · SE글로벌 렌탈';
    document.getElementById('vName').textContent=v.name;
    document.getElementById('vTag').textContent=v.tagline||'';
    document.getElementById('pR').textContent=v.rental_price||'문의';
    document.getElementById('pL').textContent=v.lease_price||'문의';
    document.getElementById('descT').textContent=v.description||'상세 설명이 준비 중입니다.';

    // 제원
    let specs={};
    if(v.specs){try{specs=typeof v.specs==='string'?JSON.parse(v.specs):v.specs;}catch(e){}}
    const ents=Object.entries(specs);
    document.getElementById('specG').innerHTML=ents.length
      ?ents.map(([k,val])=>`<div class="spec-item"><div class="spec-key">${k}</div><div class="spec-val">${val}</div></div>`).join('')
      :'<div class="spec-item" style="grid-column:1/-1"><div class="spec-key">제원 정보</div><div class="spec-val" style="color:var(--text3)">등록되지 않음</div></div>';

    // 이미지
    try{imgs=typeof v.images==='string'?JSON.parse(v.images):(Array.isArray(v.images)?v.images:[]);}catch(e){imgs=[];}
    buildGallery();
    loadCTA();

    document.getElementById('lwrap').style.display='none';
    document.getElementById('main').style.display='grid';

    // 애니메이션
    setTimeout(()=>{
      const obs=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('in');});},{threshold:.08});
      document.querySelectorAll('.anim').forEach(el=>obs.observe(el));
    },100);
  }catch(e){showErr();}
}

function showErr(){document.getElementById('lwrap').style.display='none';document.getElementById('ewrap').style.display='block';}

function buildGallery(){
  const gm=document.getElementById('gmain');
  const gt=document.getElementById('gthumbs');
  if(!imgs.length)return;
  cur=imgs.findIndex(i=>i.is_main);
  if(cur<0)cur=0;
  renderImg();
  if(imgs.length>1){
    const pa=document.createElement('button');pa.className='garr prev';pa.innerHTML='‹';pa.onclick=()=>moveG(-1);
    const na=document.createElement('button');na.className='garr next';na.innerHTML='›';na.onclick=()=>moveG(1);
    const ct=document.createElement('div');ct.className='gctr';ct.id='gctr';ct.textContent=`${cur+1} / ${imgs.length}`;
    gm.appendChild(pa);gm.appendChild(na);gm.appendChild(ct);
    gt.innerHTML=imgs.map((img,i)=>`<div class="gthumb ${i===cur?'on':''}" onclick="goG(${i})"><img src="${img.url}" alt=""></div>`).join('');
  }
}

function renderImg(){
  const gm=document.getElementById('gmain');
  gm.querySelectorAll('img:not(#lbimg)').forEach(e=>e.remove());
  gm.querySelector('.gallery-main-ph')?.remove();
  const img=document.createElement('img');
  img.src=imgs[cur].url;
  img.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;cursor:zoom-in;z-index:0';
  img.onclick=()=>openLb(cur);
  img.onerror=()=>{img.remove();const ph=document.createElement('div');ph.className='gallery-main-ph';ph.textContent='🏍️';gm.prepend(ph);};
  gm.prepend(img);
}

function moveG(d){cur=(cur+d+imgs.length)%imgs.length;renderImg();const ct=document.getElementById('gctr');if(ct)ct.textContent=`${cur+1} / ${imgs.length}`;document.querySelectorAll('.gthumb').forEach((t,i)=>t.classList.toggle('on',i===cur));}
function goG(i){cur=i;renderImg();const ct=document.getElementById('gctr');if(ct)ct.textContent=`${cur+1} / ${imgs.length}`;document.querySelectorAll('.gthumb').forEach((t,j)=>t.classList.toggle('on',j===cur));}
function openLb(i){cur=i;document.getElementById('lbimg').src=imgs[i].url;document.getElementById('lb').classList.add('on');}
function closeLb(){document.getElementById('lb').classList.remove('on');}
function moveLb(d){cur=(cur+d+imgs.length)%imgs.length;document.getElementById('lbimg').src=imgs[cur].url;goG(cur);}
document.addEventListener('keydown',e=>{if(document.getElementById('lb').classList.contains('on')){if(e.key==='ArrowLeft')moveLb(-1);if(e.key==='ArrowRight')moveLb(1);if(e.key==='Escape')closeLb();}});

async function loadCTA(){
  try{
    const{data:rows}=await sb.from('site_config').select('phone,kakao_url').eq('id',1).limit(1);
    const s=rows&&rows.length?rows[0]:null;
    if(!s)return;
    if(s.phone){
      ['pcP','mP'].forEach(id=>{const el=document.getElementById(id);if(el)el.onclick=()=>location.href='tel:'+s.phone;});
      document.getElementById('mP').textContent='📞 '+s.phone;
    }
    if(s.kakao_url){['pcK','mK'].forEach(id=>{const el=document.getElementById(id);if(el)el.onclick=()=>window.open(s.kakao_url,'_blank');});}
  }catch(e){}
}

function shareV(){
  if(navigator.share)navigator.share({title:document.title,url:location.href});
  else{navigator.clipboard?.writeText(location.href);alert('링크가 복사됐습니다!');}
}
init();
</script>
