<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>차량 모델 | SE글로벌 렌탈 TEAMBRO</title>
<meta name="description" content="이누리 전기오토바이 렌탈 리스 전문 SE글로벌 렌탈. 전체 차량 모델 라인업을 확인하세요.">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--bg2:#141414;--bg3:#1c1c1e;--bg4:#2c2c2e;--border:#2c2c2e;--border2:#3a3a3c;--text:#f5f5f7;--text2:#a1a1a6;--text3:#6e6e73;--teal:#a3e635;--accent:#0a84ff;--accent2:#30d158}
html{scroll-behavior:smooth}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;padding-bottom:80px}
a{text-decoration:none;color:inherit}

/* Header */
header{background:rgba(10,10,10,.9);backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:100}
.hi{max-width:1100px;margin:0 auto;padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:52px}
.logo{display:flex;align-items:center}
.logo .se{color:#ff2d2d;font-weight:900;font-size:17px;font-style:italic}
.logo .gl{color:#fff;font-weight:900;font-size:17px}
.logo .x{color:rgba(255,255,255,.3);font-weight:300;font-size:13px;margin:0 6px}
.logo .tb{color:#00ffb3;font-weight:900;font-size:17px}
nav{display:flex;gap:20px;align-items:center}
nav a{font-size:13px;color:var(--text2);transition:color .15s}
nav a:hover,nav a.on{color:var(--text)}
.hcta{background:var(--teal);color:#0a0a0a;padding:7px 16px;border-radius:980px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit}

/* Page Hero */
.page-hero{
  text-align:center;padding:56px 22px 40px;
  background:var(--bg);position:relative;overflow:hidden;
}
.page-hero::before{
  content:'';position:absolute;
  top:-20%;left:50%;transform:translateX(-50%);
  width:700px;height:700px;border-radius:50%;
  background:radial-gradient(circle,rgba(163,230,53,.06) 0%,transparent 60%);
  pointer-events:none;
}
.hero-eye{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--teal);margin-bottom:12px;display:block}
.page-hero h1{font-size:clamp(28px,5vw,52px);font-weight:900;letter-spacing:-1.5px;margin-bottom:12px;line-height:1.1}
.page-hero p{font-size:15px;color:var(--text2);max-width:480px;margin:0 auto 28px;line-height:1.6}

/* Filter tabs */
.filter-wrap{max-width:1100px;margin:0 auto;padding:0 22px 32px;display:flex;gap:8px;flex-wrap:wrap}
.ftab{
  padding:8px 20px;border-radius:980px;
  font-size:13px;font-weight:600;cursor:pointer;
  border:0.5px solid var(--border2);background:var(--bg2);
  color:var(--text2);transition:all .2s;
}
.ftab:hover{border-color:var(--teal);color:var(--teal)}
.ftab.on{background:var(--teal);color:#0a0a0a;border-color:var(--teal)}

/* Model grid */
.models-wrap{max-width:1100px;margin:0 auto;padding:0 22px}
.models-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}

/* Model card */
.mcard{
  background:var(--bg2);border:0.5px solid var(--border);
  border-radius:20px;overflow:hidden;
  transition:transform .3s,box-shadow .3s,border-color .3s;
  cursor:pointer;
}
.mcard:hover{
  transform:translateY(-6px);
  box-shadow:0 20px 50px rgba(0,0,0,.5);
  border-color:rgba(163,230,53,.3);
}

/* Image area with color switch */
.mcard-imgs{position:relative;aspect-ratio:4/3;overflow:hidden;background:var(--bg3)}
.mcard-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity .4s}
.mcard-img.dark{opacity:1}
.mcard-img.light{opacity:0}
.mcard:hover .mcard-img.dark{opacity:0}
.mcard:hover .mcard-img.light{opacity:1}
.mcard-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:64px}

/* Tags on image */
.mcard-tags{position:absolute;top:14px;left:14px;display:flex;gap:6px;flex-wrap:wrap;z-index:2}
.mcard-tag{
  padding:4px 10px;border-radius:980px;
  font-size:10px;font-weight:700;
  background:rgba(0,0,0,.6);backdrop-filter:blur(8px);
  border:0.5px solid rgba(255,255,255,.15);color:#fff;
}
.mcard-tag.recommend{background:rgba(163,230,53,.2);border-color:rgba(163,230,53,.4);color:var(--teal)}
.mcard-tag.new{background:rgba(255,0,110,.2);border-color:rgba(255,0,110,.4);color:#ff006e}
.mcard-tag.soon{background:rgba(100,100,100,.4);border-color:rgba(255,255,255,.1);color:var(--text2)}

/* Model info */
.mcard-body{padding:20px 22px 0}
.mcard-name{font-size:22px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px}
.mcard-sub{font-size:13px;color:var(--text2);margin-bottom:16px}

/* Specs */
.mcard-specs{display:flex;gap:0;border:0.5px solid var(--border2);border-radius:10px;overflow:hidden;margin-bottom:16px}
.spec-item{flex:1;padding:10px 6px;text-align:center;border-right:0.5px solid var(--border2);background:var(--bg3)}
.spec-item:last-child{border-right:none}
.spec-val{font-size:15px;font-weight:800;color:var(--text);line-height:1}
.spec-unit{font-size:9px;color:var(--teal);font-weight:700;margin-top:1px}
.spec-label{font-size:9px;color:var(--text3);margin-top:3px}

/* Price */
.mcard-price{padding:16px 0;border-top:0.5px solid var(--border2)}
.price-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.price-label{font-size:12px;color:var(--text3)}
.price-val{font-size:13px;font-weight:600;color:var(--text2)}
.price-row.main .price-val{font-size:20px;font-weight:900;color:var(--teal)}
.price-note{font-size:10px;color:var(--text3);margin-top:4px}

/* CTA buttons */
.mcard-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 0 20px}
.btn-detail{
  padding:11px;border-radius:10px;font-size:13px;font-weight:700;
  border:0.5px solid var(--border2);background:var(--bg3);
  color:var(--text);cursor:pointer;font-family:inherit;transition:all .2s;
  text-align:center;
}
.btn-detail:hover{border-color:var(--teal);color:var(--teal)}
.btn-consult{
  padding:11px;border-radius:10px;font-size:13px;font-weight:700;
  border:none;background:var(--teal);color:#0a0a0a;
  cursor:pointer;font-family:inherit;transition:opacity .2s;
  text-align:center;
}
.btn-consult:hover{opacity:.85}
.btn-soon{
  grid-column:1/-1;padding:11px;border-radius:10px;font-size:13px;font-weight:700;
  border:0.5px solid var(--border2);background:var(--bg3);color:var(--text3);
  cursor:not-allowed;font-family:inherit;text-align:center;
}

/* Loading */
.loading{text-align:center;padding:80px 20px;color:var(--text3)}
.spin{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Bottom CTA */
.bottom-cta{background:linear-gradient(135deg,rgba(163,230,53,.08),rgba(10,132,255,.04));border-top:0.5px solid var(--border);margin-top:48px;padding:48px 22px;text-align:center}
.bottom-cta h2{font-size:clamp(20px,4vw,36px);font-weight:900;margin-bottom:10px;letter-spacing:-.5px}
.bottom-cta p{font-size:14px;color:var(--text2);margin-bottom:24px}
.bottom-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.bphone{background:var(--teal);color:#0a0a0a;padding:14px 28px;border-radius:980px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit}
.bkakao{background:#FEE500;color:#1a1a00;padding:14px 28px;border-radius:980px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit}

/* Mobile CTA */
.mcta{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,.92);backdrop-filter:blur(20px);border-top:0.5px solid var(--border);padding:10px 16px;z-index:200;grid-template-columns:1fr 1fr;gap:8px}
.mb{padding:13px;border-radius:12px;font-size:14px;font-weight:700;text-align:center;border:none;cursor:pointer;font-family:inherit}
.mp{background:var(--teal);color:#0a0a0a}
.mk{background:#FEE500;color:#1d1d1f}

/* Anim */
.anim{opacity:0;transform:translateY(24px);transition:opacity .5s ease,transform .5s ease}
.anim.in{opacity:1;transform:translateY(0)}

@media(max-width:768px){
  .models-grid{grid-template-columns:1fr 1fr;gap:12px}
  .mcard-body{padding:14px 14px 0}
  .mcard-name{font-size:18px}
  .mcard-btns{padding:0 0 14px}
  body{padding-bottom:72px}
  .mcta{display:grid}
}
@media(max-width:480px){
  .models-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<script>
const SB_URL='https://ogjrhphhpqpzlzlbugdp.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nanJocGhocHFwemx6bGJ1Z2RwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2Mjc4MzUsImV4cCI6MjA4OTIwMzgzNX0.tdVzi9swRk_sKbNqFvIMg30q5XcgDXRfVJitPNCFRA8';
const sb=supabase.createClient(SB_URL,SB_KEY);
</script>

<header>
  <div class="hi">
    <a href="index.html" class="logo"><span class="se">SE</span><span class="gl">GLOBAL</span><span class="x">×</span><span class="tb">TEAMBRO</span></a>
    <nav>
      <a href="models.html" class="on">모델</a>
      <a href="service.html">서비스</a>
      <a href="index.html#consult">상담</a>
    </nav>
    <button class="hcta" id="headerPhone">📞 상담 신청</button>
  </div>
</header>

<div class="page-hero">
  <span class="hero-eye">Vehicle Models</span>
  <h1>전체 차량 모델</h1>
  <p>배달 라이더를 위해 검증된 차량만<br>엄선하여 제공합니다</p>
</div>

<div class="filter-wrap">
  <div class="ftab on" onclick="filterModels('all',this)">전체</div>
  <div class="ftab" onclick="filterModels('electric',this)">⚡ 전기이륜차</div>
  <div class="ftab" onclick="filterModels('gasoline',this)">⛽ 내연기관</div>
</div>

<div class="models-wrap">
  <div class="models-grid" id="modelsGrid">
    <div class="loading"><div class="spin"></div>차량을 불러오는 중...</div>
  </div>
</div>

<div class="bottom-cta">
  <h2>어떤 차량이 맞을지 모르겠다면?</h2>
  <p>전문 상담사가 맞춤 차량을 추천해 드립니다</p>
  <div class="bottom-btns">
    <button class="bphone" id="ctaPhone">📞 전화 상담</button>
    <button class="bkakao" id="ctaKakao">💬 카카오톡 상담</button>
  </div>
</div>

<div class="mcta">
  <button class="mb mp" id="mPhone">📞 전화 상담</button>
  <button class="mb mk" id="mKakao">💬 카카오톡</button>
</div>

<script>
let allVehicles=[];
let curFilter='all';
let sitePhone='';
let siteKakao='';

function filterModels(type,el){
  curFilter=type;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  renderModels();
}

function renderModels(){
  const filtered=curFilter==='all'?allVehicles:allVehicles.filter(v=>v.type===curFilter);
  const grid=document.getElementById('modelsGrid');
  if(!filtered.length){
    grid.innerHTML='<p style="color:var(--text3);font-size:14px;padding:60px 0;text-align:center;grid-column:1/-1">해당 차량이 없습니다</p>';
    return;
  }
  grid.innerHTML=filtered.map((v,idx)=>{
    const imgs=Array.isArray(v.images)?v.images:(typeof v.images==='string'?JSON.parse(v.images||'[]'):[]);
    const mainImg=imgs.find(x=>x.is_main)||imgs[0];
    const subImg=imgs[1]||mainImg;
    const isEv=v.type==='electric';

    // Image area
    let imgHtml='';
    if(mainImg){
      imgHtml=`<img class="mcard-img dark" src="${mainImg.url}" alt="${v.name}" loading="lazy">`;
      if(subImg&&subImg.url!==mainImg.url){
        imgHtml+=`<img class="mcard-img light" src="${subImg.url}" alt="${v.name}" loading="lazy">`;
      }
    } else {
      imgHtml=`<div class="mcard-img-ph">${isEv?'⚡':'🏍️'}</div>`;
    }

    // Specs from specs object
    let specs={};
    if(v.specs){try{specs=typeof v.specs==='string'?JSON.parse(v.specs):v.specs;}catch(e){}}
    const specKeys=Object.keys(specs).slice(0,3);
    const specsHtml=specKeys.length?specKeys.map(k=>`
      <div class="spec-item">
        <div class="spec-val">${specs[k]}</div>
        <div class="spec-label">${k}</div>
      </div>`).join(''):`
      <div class="spec-item"><div class="spec-val">-</div><div class="spec-label">주행거리</div></div>
      <div class="spec-item"><div class="spec-val">-</div><div class="spec-label">최고속도</div></div>
      <div class="spec-item"><div class="spec-val">-</div><div class="spec-label">등판능력</div></div>`;

    // Tags
    let tags='';
    if(v.badge)tags+=`<span class="mcard-tag recommend">${v.badge}</span>`;
    if(isEv)tags+=`<span class="mcard-tag">⚡ 전기</span>`;
    else tags+=`<span class="mcard-tag">⛽ 내연</span>`;

    // Price
    const rentalPrice=v.rental_price||'문의';
    const leasePrice=v.lease_price||'문의';

    // Buttons
    const btnsHtml=`
      <div class="btn-detail" onclick="event.stopPropagation();location.href='vehicle.html?id=${v.id}'">상세 보기</div>
      <div class="btn-consult" onclick="event.stopPropagation();${sitePhone?`location.href='tel:${sitePhone}'`:'location.href=\'index.html#consult\''}">상담 신청</div>`;

    return `<div class="mcard anim" style="transition-delay:${idx*0.05}s" onclick="location.href='vehicle.html?id=${v.id}'">
      <div class="mcard-imgs">
        ${imgHtml}
        <div class="mcard-tags">${tags}</div>
      </div>
      <div class="mcard-body">
        <div class="mcard-name">${v.name}</div>
        <div class="mcard-sub">${v.tagline||'SE글로벌 렌탈 추천 차량'}</div>
        <div class="mcard-specs">${specsHtml}</div>
        <div class="mcard-price">
          <div class="price-row main">
            <span class="price-label">🛵 렌탈</span>
            <span class="price-val">${rentalPrice} / 월~</span>
          </div>
          <div class="price-row">
            <span class="price-label">📋 리스</span>
            <span class="price-val">${leasePrice} / 월~</span>
          </div>
          <div class="price-note">※ 정확한 금액은 상담 후 확정됩니다</div>
        </div>
        <div class="mcard-btns">${btnsHtml}</div>
      </div>
    </div>`;
  }).join('');

  // Trigger anim observer
  setTimeout(()=>{
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in');});
    },{threshold:.1});
    document.querySelectorAll('.anim:not(.in)').forEach(el=>obs.observe(el));
  },50);
}

async function init(){
  try{
    const{data:rows}=await sb.from('site_config').select('phone,kakao_url').eq('id',1).limit(1);
    const s=rows&&rows.length?rows[0]:null;
    if(s){
      if(s.phone){
        sitePhone=s.phone;
        ['headerPhone','ctaPhone','mPhone'].forEach(id=>{
          const el=document.getElementById(id);
          if(el)el.onclick=()=>location.href='tel:'+s.phone;
        });
        document.getElementById('mPhone').textContent='📞 '+s.phone;
      }
      if(s.kakao_url){
        siteKakao=s.kakao_url;
        ['ctaKakao','mKakao'].forEach(id=>{
          const el=document.getElementById(id);
          if(el)el.onclick=()=>window.open(s.kakao_url,'_blank');
        });
      }
    }
  }catch(e){}

  try{
    const{data,error}=await sb.from('vehicles').select('*').order('sort_order',{ascending:true});
    if(error)throw error;
    allVehicles=data||[];
    renderModels();
  }catch(e){
    document.getElementById('modelsGrid').innerHTML='<p style="color:var(--text3);font-size:14px;padding:60px 0;text-align:center;grid-column:1/-1">차량 정보를 불러올 수 없습니다</p>';
  }
}

// URL 필터 처리
const urlType=new URLSearchParams(location.search).get('type');
if(urlType){
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'));
  if(urlType==='electric'){document.querySelectorAll('.ftab')[1].classList.add('on');curFilter='electric';}
  else if(urlType==='gasoline'){document.querySelectorAll('.ftab')[2].classList.add('on');curFilter='gasoline';}
}

init();
</script>
</body>
</html>
