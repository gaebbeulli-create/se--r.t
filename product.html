<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상품 안내 | SE글로벌 렌탈 TEAMBRO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--bg2:#141414;--bg3:#1c1c1e;--bg4:#2c2c2e;--border:#2c2c2e;--border2:#3a3a3c;--text:#f5f5f7;--text2:#a1a1a6;--text3:#6e6e73;--teal:#a3e635;--accent:#0a84ff;--accent2:#30d158}
html{scroll-behavior:smooth}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;padding-bottom:80px}
a{text-decoration:none;color:inherit}
header{background:rgba(10,10,10,.9);backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:100}
.hi{max-width:1100px;margin:0 auto;padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:52px}
.logo{display:flex;align-items:center}
.logo .se{color:#ff2d2d;font-weight:900;font-size:17px;font-style:italic}
.logo .gl{color:#fff;font-weight:900;font-size:17px}
.logo .x{color:rgba(255,255,255,.3);font-weight:300;font-size:13px;margin:0 6px}
.logo .tb{color:#00ffb3;font-weight:900;font-size:17px}
nav{display:flex;gap:20px}
nav a{font-size:13px;color:var(--text2);transition:color .15s}
nav a:hover,nav a.on{color:var(--text)}
.hcta{background:var(--teal);color:#0a0a0a;padding:7px 16px;border-radius:980px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit}

/* Hero */
.page-hero{text-align:center;padding:52px 22px 36px;position:relative;overflow:hidden}
.page-hero::before{content:'';position:absolute;top:-20%;left:50%;transform:translateX(-50%);width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(163,230,53,.06) 0%,transparent 60%);pointer-events:none}
.hero-eye{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--teal);margin-bottom:10px;display:block}
.page-hero h1{font-size:clamp(24px,5vw,44px);font-weight:900;letter-spacing:-1.5px;margin-bottom:10px}
.page-hero p{font-size:14px;color:var(--text2);max-width:460px;margin:0 auto}

/* Category tabs */
.cat-tabs{max-width:1100px;margin:0 auto;padding:20px 22px 0;display:flex;gap:8px;flex-wrap:wrap}
.cat-tab{
  padding:10px 22px;border-radius:980px;font-size:13px;font-weight:700;
  cursor:pointer;border:0.5px solid var(--border2);background:var(--bg2);
  color:var(--text2);transition:all .2s;flex-shrink:0;
}
.cat-tab:hover{border-color:var(--teal);color:var(--teal)}
.cat-tab.on{background:var(--teal);color:#0a0a0a;border-color:var(--teal)}

/* Products grid */
.products-wrap{max-width:1100px;margin:0 auto;padding:24px 22px}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}

/* Product card */
.pcard{
  background:var(--bg2);border:0.5px solid var(--border);
  border-radius:18px;overflow:hidden;
  transition:transform .25s,box-shadow .25s,border-color .25s;
  cursor:pointer;
}
.pcard:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,.5);border-color:rgba(163,230,53,.3)}
.pcard-img{width:100%;aspect-ratio:4/3;overflow:hidden;background:var(--bg3);position:relative}
.pcard-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .4s}
.pcard:hover .pcard-img img{transform:scale(1.04)}
.pcard-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:56px}
.pcard-badge{position:absolute;top:12px;left:12px;background:rgba(163,230,53,.15);border:0.5px solid rgba(163,230,53,.3);color:var(--teal);padding:3px 10px;border-radius:980px;font-size:10px;font-weight:700;z-index:2}
.pcard-cat-badge{position:absolute;top:12px;right:12px;padding:4px 10px;border-radius:980px;font-size:10px;font-weight:700;z-index:2}
.cat-rental{background:rgba(163,230,53,.15);border:0.5px solid rgba(163,230,53,.3);color:var(--teal)}
.cat-lease{background:rgba(191,0,255,.15);border:0.5px solid rgba(191,0,255,.3);color:#bf00ff}
.cat-credit{background:rgba(10,132,255,.15);border:0.5px solid rgba(10,132,255,.3);color:var(--accent)}
.cat-sale{background:rgba(255,159,10,.15);border:0.5px solid rgba(255,159,10,.3);color:#ff9f0a}
.pcard-body{padding:18px 20px 20px}
.pcard-name{font-size:18px;font-weight:800;margin-bottom:5px;letter-spacing:-.3px}
.pcard-summary{font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.5}
.pcard-features{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.pcard-feature{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2)}
.pcard-feature::before{content:'✓';color:var(--teal);font-weight:700;flex-shrink:0}
.pcard-footer{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:0.5px solid var(--border2)}
.pcard-price-wrap{}
.pcard-original{font-size:11px;color:var(--text3);text-decoration:line-through;margin-bottom:2px}
.pcard-price{font-size:22px;font-weight:900;color:var(--teal);letter-spacing:-.5px}
.pcard-btn{background:var(--teal);color:#0a0a0a;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:opacity .2s}
.pcard-btn:hover{opacity:.85}

/* Empty */
.empty-msg{text-align:center;padding:80px 20px;color:var(--text3);grid-column:1/-1}
.spin{width:24px;height:24px;border:1.5px solid var(--border2);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Product Detail Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:500;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{
  background:var(--bg2);border:0.5px solid var(--border2);
  border-radius:20px;max-width:680px;width:100%;max-height:90vh;
  overflow-y:auto;scrollbar-width:thin;
  animation:modalIn .3s ease;
}
@keyframes modalIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.modal-box::-webkit-scrollbar{width:4px}
.modal-box::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.modal-close{position:sticky;top:0;display:flex;justify-content:flex-end;padding:16px 16px 0;background:var(--bg2);z-index:10}
.modal-close button{background:var(--bg3);border:0.5px solid var(--border2);color:var(--text2);width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-img{width:100%;aspect-ratio:16/9;overflow:hidden;background:var(--bg3);position:relative}
.modal-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.modal-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:72px}
.modal-body{padding:24px}
.modal-cat{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.modal-name{font-size:26px;font-weight:900;letter-spacing:-.5px;margin-bottom:8px}
.modal-summary{font-size:15px;color:var(--text2);line-height:1.6;margin-bottom:20px}
.modal-price-row{display:flex;align-items:baseline;gap:8px;margin-bottom:20px}
.modal-original{font-size:14px;color:var(--text3);text-decoration:line-through}
.modal-price{font-size:28px;font-weight:900;color:var(--teal);letter-spacing:-.5px}
.modal-features{margin-bottom:20px}
.modal-features-title{font-size:13px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.modal-feature-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:14px;color:var(--text2)}
.modal-feature-item:last-child{border-bottom:none}
.modal-feature-item::before{content:'✓';color:var(--teal);font-weight:800;flex-shrink:0}
.modal-desc{font-size:14px;color:var(--text2);line-height:1.8;white-space:pre-line;margin-bottom:24px}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-btn-phone{background:var(--teal);color:#0a0a0a;padding:14px;border-radius:12px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit}
.modal-btn-kakao{background:#FEE500;color:#1a1a00;padding:14px;border-radius:12px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit}

/* Thumbnails */
.modal-thumbs{display:flex;gap:6px;overflow-x:auto;padding:0 24px 16px;scrollbar-width:none}
.modal-thumbs::-webkit-scrollbar{display:none}
.modal-thumb{width:60px;height:45px;flex-shrink:0;border-radius:8px;overflow:hidden;cursor:pointer;opacity:.5;border:1.5px solid transparent;transition:all .2s}
.modal-thumb.on{opacity:1;border-color:var(--teal)}
.modal-thumb img{width:100%;height:100%;object-fit:cover}

/* Mobile CTA */
.mcta{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,.92);backdrop-filter:blur(20px);border-top:0.5px solid var(--border);padding:10px 16px;z-index:200;grid-template-columns:1fr 1fr;gap:8px}
.mb{padding:13px;border-radius:12px;font-size:14px;font-weight:700;text-align:center;border:none;cursor:pointer;font-family:inherit}
.mp{background:var(--teal);color:#0a0a0a}
.mk{background:#FEE500;color:#1d1d1f}

/* Anim */
.anim{opacity:0;transform:translateY(20px);transition:opacity .5s ease,transform .5s ease}
.anim.in{opacity:1;transform:translateY(0)}

@media(max-width:768px){
  .products-grid{grid-template-columns:repeat(2,1fr);gap:12px}
  body{padding-bottom:72px}
  .mcta{display:grid}
  .modal-btns{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){
  .products-grid{grid-template-columns:1fr}
}
</style>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">

    <div class="modal-close"><button onclick="closeModal()">✕</button></div>

  <button class="mb mp" id="mPhone">📞 전화 상담</button>

</div>

<script>
let allProds=[];
let curCat='all';
let sitePhone='';
let siteKakao='';
const catLabels={rental:'🛵 렌탈',lease:'📋 리스',credit:'💳 신용할부',sale:'🛒 판매'};
const catIcons={rental:'🛵',lease:'📋',credit:'💳',sale:'🛒'};

function filterCat(cat,el){
  curCat=cat;
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  renderProds();
}

function renderProds(){
  const filtered=curCat==='all'?allProds:allProds.filter(p=>p.category===curCat);
  const grid=document.getElementById('prodGrid');
  if(!filtered.length){
    grid.innerHTML=`<div class="empty-msg">
      <p style="font-size:36px;margin-bottom:12px">${catIcons[curCat]||'📦'}</p>
      <p style="font-size:14px;margin-bottom:6px">등록된 상품이 없습니다</p>
      <p style="font-size:12px;color:var(--text3)">어드민에서 상품을 추가해주세요</p>
    </div>`;
    return;
  }
  grid.innerHTML=filtered.map((p,i)=>{
    let imgs=[];try{imgs=typeof p.images==='string'?JSON.parse(p.images):p.images||[];}catch(e){}
    const imgEl=imgs[0]
      ?`<img src="${imgs[0]}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=pcard-img-ph>${catIcons[p.category]||'🛵'}</div>'">`
      :`<div class="pcard-img-ph">${catIcons[p.category]||'🛵'}</div>`;

    const features=(p.features||'').split('
').filter(Boolean).slice(0,3);
    const featHtml=features.map(f=>`<div class="pcard-feature">${f}</div>`).join('');

    return `<div class="pcard anim" style="transition-delay:${i*0.05}s" onclick="openModal(${i},${filtered.indexOf(p)})">
      <div class="pcard-img">
        ${imgEl}
        ${p.badge?`<div class="pcard-badge">${p.badge}</div>`:''}
        <div class="pcard-cat-badge cat-${p.category||'rental'}">${catLabels[p.category||'rental']}</div>
      </div>
      <div class="pcard-body">
        <div class="pcard-name">${p.name}</div>
        <div class="pcard-summary">${p.summary||''}</div>
        ${featHtml?`<div class="pcard-features">${featHtml}</div>`:''}
        <div class="pcard-footer">
          <div class="pcard-price-wrap">
            ${p.original_price?`<div class="pcard-original">${p.original_price}</div>`:''}
            <div class="pcard-price">${p.price||'문의'}</div>
          </div>
          <button class="pcard-btn" onclick="event.stopPropagation();openModal(${filtered.indexOf(p)})">자세히 →</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // animate
  setTimeout(()=>{
    const obs=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('in');});},{threshold:.1});
    document.querySelectorAll('.anim:not(.in)').forEach(el=>obs.observe(el));
  },50);
}

let curModalImgs=[];
let curModalImgIdx=0;

function openModal(idx){
  const filtered=curCat==='all'?allProds:allProds.filter(p=>p.category===curCat);
  const p=filtered[idx];
  if(!p)return;

  // Images
  let imgs=[];try{imgs=typeof p.images==='string'?JSON.parse(p.images):p.images||[];}catch(e){}
  curModalImgs=imgs;
  curModalImgIdx=0;
  updateModalImg(0);

  // Thumbnails
  const thumbs=document.getElementById('modalThumbs');
  if(imgs.length>1){
    thumbs.innerHTML=imgs.map((url,i)=>`<div class="modal-thumb ${i===0?'on':''}" onclick="updateModalImg(${i})"><img src="${url}" alt=""></div>`).join('');
    thumbs.style.display='flex';
  } else {
    thumbs.style.display='none';
  }

  // Info
  const catEl=document.getElementById('modalCat');
  catEl.textContent=catLabels[p.category||'rental'];
  catEl.style.color=getComputedStyle(document.documentElement).getPropertyValue('--teal');

  document.getElementById('modalName').textContent=p.name;
  document.getElementById('modalSummary').textContent=p.summary||'';

  const origEl=document.getElementById('modalOriginal');
  if(p.original_price){origEl.textContent=p.original_price;origEl.style.display='inline';}
  else origEl.style.display='none';
  document.getElementById('modalPrice').textContent=p.price||'문의';

  // Features
  const features=(p.features||'').split('
').filter(Boolean);
  if(features.length){
    document.getElementById('modalFeatures').style.display='block';
    document.getElementById('modalFeatureList').innerHTML=features.map(f=>`<div class="modal-feature-item">${f}</div>`).join('');
  } else document.getElementById('modalFeatures').style.display='none';

  // Desc
  const descEl=document.getElementById('modalDesc');
  if(p.description){descEl.textContent=p.description;descEl.style.display='block';}
  else descEl.style.display='none';

  // CTA
  document.getElementById('modalPhone').onclick=()=>{if(sitePhone)location.href='tel:'+sitePhone;};
  document.getElementById('modalKakao').onclick=()=>{if(siteKakao)window.open(siteKakao,'_blank');};

  document.getElementById('modalOverlay').classList.add('show');
  document.body.style.overflow='hidden';
}

function updateModalImg(idx){
  curModalImgIdx=idx;
  const imgEl=document.getElementById('modalImg');
  if(curModalImgs[idx]){
    imgEl.innerHTML=`<img src="${curModalImgs[idx]}" alt="" onerror="this.parentElement.innerHTML='<div class=modal-img-ph>🛵</div>'">`;
  } else {
    imgEl.innerHTML='<div class="modal-img-ph">🛵</div>';
  }
  document.querySelectorAll('.modal-thumb').forEach((t,i)=>t.classList.toggle('on',i===idx));
}

function closeModal(e){
  if(e&&e.target!==document.getElementById('modalOverlay')&&e.type==='click')return;
  document.getElementById('modalOverlay').classList.remove('show');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

async function init(){
  try{
    const{data:rows}=await sb.from('site_config').select('phone,kakao_url').eq('id',1).limit(1);
    const s=rows&&rows.length?rows[0]:null;
    if(s){
      if(s.phone){
        sitePhone=s.phone;
        ['headerPhone','mPhone'].forEach(id=>{const el=document.getElementById(id);if(el)el.onclick=()=>location.href='tel:'+s.phone;});
        document.getElementById('mPhone').textContent='📞 '+s.phone;
      }
      if(s.kakao_url){
        siteKakao=s.kakao_url;
        ['mKakao'].forEach(id=>{const el=document.getElementById(id);if(el)el.onclick=()=>window.open(s.kakao_url,'_blank');});
      }
    }
  }catch(e){}

  try{
    const{data,error}=await sb.from('products').select('*').eq('is_active',true).order('sort_order',{ascending:true});
    console.log('Products result:', {data, error});
    if(error)throw error;
    allProds=data||[];

    // URL tab 파라미터
    const tab=new URLSearchParams(location.search).get('tab');
    if(tab){
      const tabEl=document.querySelector(`.cat-tab[onclick*="${tab}"]`);
      if(tabEl){document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('on'));tabEl.classList.add('on');curCat=tab;}
    }
    renderProds();
  }catch(e){
    console.error('Products error:',e);
    const errMsg = e?.message || e?.toString() || '알 수 없는 오류';
    document.getElementById('prodGrid').innerHTML=`<div class="empty-msg">
      <p style="font-size:36px;margin-bottom:12px">⚠️</p>
      <p style="font-size:14px;color:var(--text3);margin-bottom:8px">상품을 불러올 수 없습니다</p>
      <p style="font-size:11px;color:#ff453a;background:rgba(255,69,58,.1);padding:8px 12px;border-radius:8px;margin-top:8px;max-width:400px;word-break:break-all">${errMsg}</p>
    </div>`;
  }
}
init();
</script>
</body>
</html>
