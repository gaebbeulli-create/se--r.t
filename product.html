<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상품 안내 | SE글로벌 렌탈 TEAMBRO</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--bg2:#141414;--bg3:#1c1c1e;--border:#2c2c2e;--border2:#3a3a3c;--text:#f5f5f7;--text2:#a1a1a6;--text3:#6e6e73;--teal:#a3e635;--accent:#0a84ff}
html{scroll-behavior:smooth}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;padding-bottom:80px}
a{text-decoration:none;color:inherit}

/* Header */
header{background:rgba(10,10,10,.9);backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:100}
.hi{max-width:1100px;margin:0 auto;padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:52px}
.logo{display:flex;align-items:center}
.logo .se{color:#ff2d2d;font-weight:900;font-size:17px;font-style:italic}
.logo .gl{color:#fff;font-weight:900;font-size:17px}
.logo .x{color:rgba(255,255,255,.3);font-weight:300;font-size:13px;margin:0 6px}
.logo .tb{color:#00ffb3;font-weight:900;font-size:17px}
nav{display:flex;gap:16px;align-items:center}
nav a{font-size:13px;color:var(--text2);white-space:nowrap}
nav a:hover,nav a.on{color:var(--text)}
.hcta{background:var(--teal);color:#0a0a0a;padding:7px 16px;border-radius:980px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit}

/* Hero */
.page-hero{text-align:center;padding:48px 22px 32px;position:relative;overflow:hidden}
.page-hero::before{content:'';position:absolute;top:-20%;left:50%;transform:translateX(-50%);width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(163,230,53,.05) 0%,transparent 60%);pointer-events:none}
.hero-eye{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--teal);margin-bottom:10px;display:block}
.page-hero h1{font-size:clamp(24px,5vw,44px);font-weight:900;letter-spacing:-1.5px;margin-bottom:10px}
.page-hero p{font-size:14px;color:var(--text2);max-width:460px;margin:0 auto}

/* Category tabs */
.cat-tabs{max-width:1100px;margin:0 auto;padding:20px 22px 0;display:flex;gap:8px;flex-wrap:wrap}
.cat-tab{padding:9px 20px;border-radius:980px;font-size:13px;font-weight:700;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);transition:all .2s;flex-shrink:0}
.cat-tab.on{background:var(--teal);color:#0a0a0a;border-color:var(--teal)}

/* Products grid */
.products-wrap{max-width:1100px;margin:0 auto;padding:24px 22px}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

/* Product card */
.pcard{background:var(--bg2);border:0.5px solid var(--border);border-radius:18px;overflow:hidden;transition:transform .25s,box-shadow .25s,border-color .25s;cursor:pointer}
.pcard:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(0,0,0,.5);border-color:rgba(163,230,53,.3)}
.pcard-img{width:100%;aspect-ratio:4/3;overflow:hidden;background:var(--bg3);position:relative}
.pcard-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .4s}
.pcard:hover .pcard-img img{transform:scale(1.04)}
.pcard-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:56px}
.pcard-badge{position:absolute;top:12px;left:12px;background:rgba(163,230,53,.15);border:0.5px solid rgba(163,230,53,.3);color:var(--teal);padding:3px 10px;border-radius:980px;font-size:10px;font-weight:700;z-index:2}
.pcard-cat-badge{position:absolute;top:12px;right:12px;padding:4px 10px;border-radius:980px;font-size:10px;font-weight:700;z-index:2}
.cat-rental{background:rgba(163,230,53,.15);border:0.5px solid rgba(163,230,53,.3);color:var(--teal)}
.cat-lease{background:rgba(191,0,255,.15);border:0.5px solid rgba(191,0,255,.3);color:#bf00ff}
.cat-credit{background:rgba(10,132,255,.15);border:0.5px solid rgba(10,132,255,.3);color:var(--accent)}
.cat-sale{background:rgba(255,159,10,.15);border:0.5px solid rgba(255,159,10,.3);color:#ff9f0a}
.pcard-body{padding:16px 18px 18px}
.pcard-name{font-size:17px;font-weight:800;margin-bottom:4px;letter-spacing:-.3px}
.pcard-summary{font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.5}
.pcard-features{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.pcard-feature{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px}
.pcard-feature::before{content:'✓';color:var(--teal);font-weight:700;flex-shrink:0}
.pcard-footer{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:0.5px solid var(--border2)}
.pcard-original{font-size:11px;color:var(--text3);text-decoration:line-through;margin-bottom:2px}
.pcard-price{font-size:20px;font-weight:900;color:var(--teal)}
.pcard-btn{background:var(--teal);color:#0a0a0a;padding:9px 16px;border-radius:10px;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:inherit}

/* Empty */
.empty-msg{text-align:center;padding:80px 20px;color:var(--text3);grid-column:1/-1}
.spin{width:24px;height:24px;border:1.5px solid var(--border2);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Modal */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.85);backdrop-filter:blur(8px);
  z-index:500;overflow-y:auto;padding:20px;
}
.modal-overlay.show{display:flex;align-items:flex-start;justify-content:center}
.modal-box{
  background:var(--bg2);border:0.5px solid var(--border2);
  border-radius:20px;max-width:640px;width:100%;
  margin:auto;position:relative;
  animation:modalIn .25s ease;
}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-close-btn{
  position:absolute;top:14px;right:14px;z-index:10;
  background:rgba(0,0,0,.5);border:0.5px solid rgba(255,255,255,.15);
  color:#fff;width:32px;height:32px;border-radius:50%;
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.modal-imgs{position:relative;aspect-ratio:16/9;overflow:hidden;background:var(--bg3);border-radius:20px 20px 0 0}
.modal-imgs img{width:100%;height:100%;object-fit:cover}
.modal-imgs-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:72px}
.modal-thumbs{display:flex;gap:6px;overflow-x:auto;padding:12px 20px 0;scrollbar-width:none}
.modal-thumbs::-webkit-scrollbar{display:none}
.modal-thumb{width:56px;height:42px;flex-shrink:0;border-radius:8px;overflow:hidden;cursor:pointer;opacity:.5;border:1.5px solid transparent;transition:all .2s}
.modal-thumb.on{opacity:1;border-color:var(--teal)}
.modal-thumb img{width:100%;height:100%;object-fit:cover}
.modal-body{padding:20px}
.modal-cat{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--teal);margin-bottom:6px}
.modal-name{font-size:24px;font-weight:900;letter-spacing:-.5px;margin-bottom:8px}
.modal-summary{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:16px}
.modal-price-row{display:flex;align-items:baseline;gap:8px;margin-bottom:16px}
.modal-original{font-size:13px;color:var(--text3);text-decoration:line-through}
.modal-price{font-size:26px;font-weight:900;color:var(--teal)}
.modal-feats-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.modal-feat{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:14px;color:var(--text2)}
.modal-feat:last-child{border-bottom:none}
.modal-feat::before{content:'✓';color:var(--teal);font-weight:800}
.modal-desc{font-size:13px;color:var(--text2);line-height:1.8;white-space:pre-line;margin:16px 0}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.modal-btn-p{background:var(--teal);color:#0a0a0a;padding:14px;border-radius:12px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit}
.modal-btn-k{background:#FEE500;color:#1a1a00;padding:14px;border-radius:12px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit}

/* Mobile CTA */
.mcta{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,.92);backdrop-filter:blur(20px);border-top:0.5px solid var(--border);padding:10px 16px;z-index:200;grid-template-columns:1fr 1fr;gap:8px}
.mb{padding:13px;border-radius:12px;font-size:14px;font-weight:700;text-align:center;border:none;cursor:pointer;font-family:inherit}
.mp{background:var(--teal);color:#0a0a0a}
.mk{background:#FEE500;color:#1d1d1f}

@media(max-width:768px){
  nav{display:none}
  .products-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  body{padding-bottom:72px}
  .mcta{display:grid}
  .modal-btns{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){
  .products-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <div class="hi">

<div class="products-wrap">
  <div class="products-grid" id="prodGrid">
    <div class="empty-msg"><div class="spin"></div>불러오는 중...</div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBox">
    <button class="modal-close-btn" id="modalCloseBtn">✕</button>
    <div class="modal-imgs" id="modalImgs"><div class="modal-imgs-ph">🛵</div></div>

      <div class="modal-cat" id="modalCat"></div>

        <button class="modal-btn-p" id="modalPhone">📞 전화 상담</button>
        <button class="modal-btn-k" id="modalKakao">💬 카카오톡</button>
      </div>
    </div>
  </div>
</div>

<div class="mcta">
  <button class="mb mp" id="mPhone">📞 전화 상담</button>
  <button class="mb mk" id="mKakao">💬 카카오톡</button>
</div>

<script>
const catLabels = {rental:'🛵 렌탈', lease:'📋 리스', credit:'💳 신용할부', sale:'🛒 판매'};
const catIcons  = {rental:'🛵', lease:'📋', credit:'💳', sale:'🛒'};

let allProds = [];
let curCat   = 'all';
let sitePhone = '';
let siteKakao = '';
let curModalImgs = [];
let modalOpen = false;

// ── Category tabs ──
document.querySelectorAll('.cat-tab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('on'));
    this.classList.add('on');
    curCat = this.dataset.cat;
    renderProds();
  });
});

// ── Render products ──
function renderProds() {
  const filtered = curCat === 'all' ? allProds : allProds.filter(p => p.category === curCat);
  const grid = document.getElementById('prodGrid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-msg"><p style="font-size:36px;margin-bottom:10px">' +
      (catIcons[curCat] || '📦') + '</p><p style="font-size:14px">등록된 상품이 없습니다</p><p style="font-size:12px;color:var(--text3);margin-top:6px">어드민에서 상품을 추가해주세요</p></div>';
    return;
  }
  grid.innerHTML = '';
  filtered.forEach(function(p, idx) {
    let imgs = [];
    try { imgs = typeof p.images === 'string' ? JSON.parse(p.images) : (p.images || []); } catch(e) {}
    const imgUrl = imgs[0] || '';

    const card = document.createElement('div');
    card.className = 'pcard';

    const features = (p.features || '').split('\n').filter(Boolean).slice(0,3);
    const featHtml = features.map(f => '<div class="pcard-feature">' + f + '</div>').join('');

    card.innerHTML =
      '<div class="pcard-img">' +
        (imgUrl ? '<img src="' + imgUrl + '" alt="' + (p.name||'') + '" loading="lazy">' : '<div class="pcard-img-ph">' + (catIcons[p.category]||'🛵') + '</div>') +
        (p.badge ? '<div class="pcard-badge">' + p.badge + '</div>' : '') +
        '<div class="pcard-cat-badge cat-' + (p.category||'rental') + '">' + (catLabels[p.category||'rental']) + '</div>' +
      '</div>' +
      '<div class="pcard-body">' +
        '<div class="pcard-name">' + (p.name||'') + '</div>' +
        '<div class="pcard-summary">' + (p.summary||'') + '</div>' +
        (featHtml ? '<div class="pcard-features">' + featHtml + '</div>' : '') +
        '<div class="pcard-footer">' +
          '<div>' +
            (p.original_price ? '<div class="pcard-original">' + p.original_price + '</div>' : '') +
            '<div class="pcard-price">' + (p.price||'문의') + '</div>' +
          '</div>' +
          '<button class="pcard-btn" type="button">자세히 →</button>' +
        '</div>' +
      '</div>';

    // Click handlers - addEventListener (no inline onclick)
    card.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      openModal(idx);
    });
    card.querySelector('.pcard-btn').addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      openModal(idx);
    });

    grid.appendChild(card);
  });
}

// ── Modal ──
function openModal(idx) {
  const filtered = curCat === 'all' ? allProds : allProds.filter(p => p.category === curCat);
  const p = filtered[idx];
  if (!p) return;

  let imgs = [];
  try { imgs = typeof p.images === 'string' ? JSON.parse(p.images) : (p.images || []); } catch(e) {}

  // Main image
  const imgEl = document.getElementById('modalImgs');
  if (imgs[0]) {
    imgEl.innerHTML = '<img src="' + imgs[0] + '" alt="' + (p.name||'') + '" id="modalMainImg">';
  } else {
    imgEl.innerHTML = '<div class="modal-imgs-ph">' + (catIcons[p.category]||'🛵') + '</div>';
  }

  // Thumbnails
  const thumbEl = document.getElementById('modalThumbs');
  if (imgs.length > 1) {
    thumbEl.innerHTML = imgs.map(function(url, i) {
      return '<div class="modal-thumb' + (i===0?' on':'') + '" data-idx="' + i + '" data-url="' + url + '"><img src="' + url + '" alt=""></div>';
    }).join('');
    thumbEl.querySelectorAll('.modal-thumb').forEach(function(t) {
      t.addEventListener('click', function() {
        document.getElementById('modalMainImg') && (document.getElementById('modalMainImg').src = this.dataset.url);
        thumbEl.querySelectorAll('.modal-thumb').forEach(function(x){x.classList.remove('on');});
        this.classList.add('on');
      });
    });
    thumbEl.style.display = 'flex';
  } else {
    thumbEl.style.display = 'none';
  }

  document.getElementById('modalCat').textContent = catLabels[p.category||'rental'] || '';
  document.getElementById('modalName').textContent = p.name || '';
  document.getElementById('modalSummary').textContent = p.summary || '';

  const origEl = document.getElementById('modalOriginal');
  origEl.textContent = p.original_price || '';
  origEl.style.display = p.original_price ? 'inline' : 'none';
  document.getElementById('modalPrice').textContent = p.price || '문의';

  const feats = (p.features || '').split('\n').filter(Boolean);
  const featsEl = document.getElementById('modalFeats');
  if (feats.length) {
    featsEl.innerHTML = '<div class="modal-feats-title">포함 혜택</div>' +
      feats.map(function(f){ return '<div class="modal-feat">' + f + '</div>'; }).join('');
  } else {
    featsEl.innerHTML = '';
  }

  const descEl = document.getElementById('modalDesc');
  descEl.textContent = p.description || '';
  descEl.style.display = p.description ? 'block' : 'none';

  document.getElementById('modalPhone').onclick = function() {
    if (sitePhone) location.href = 'tel:' + sitePhone;
  };
  document.getElementById('modalKakao').onclick = function() {
    if (siteKakao) window.open(siteKakao, '_blank');
  };

  document.getElementById('modalOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
  modalOpen = true;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  document.body.style.overflow = '';
  modalOpen = false;
}

// Close button
document.getElementById('modalCloseBtn').addEventListener('click', function(e) {
  e.stopPropagation();
  closeModal();
});

// Click overlay background to close
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Prevent modal box clicks from closing
document.getElementById('modalBox').addEventListener('click', function(e) {
  e.stopPropagation();
});

// ESC key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

// ── Init ──
async function init() {
  try {
    const { data: rows } = await sb.from('site_config').select('phone,kakao_url').eq('id', 1).limit(1);
    const s = rows && rows.length ? rows[0] : null;
    if (s) {
      if (s.phone) {
        sitePhone = s.phone;
        ['headerPhone','mPhone'].forEach(function(id) {
          const el = document.getElementById(id);
          if (el) el.onclick = function() { location.href = 'tel:' + s.phone; };
        });
        document.getElementById('mPhone').textContent = '📞 ' + s.phone;
      }
      if (s.kakao_url) {
        siteKakao = s.kakao_url;
        const mk = document.getElementById('mKakao');
        if (mk) mk.onclick = function() { window.open(s.kakao_url, '_blank'); };
      }
    }
  } catch(e) {}

  try {
    const urlTab = new URLSearchParams(location.search).get('tab');
    if (urlTab) {
      document.querySelectorAll('.cat-tab').forEach(function(t) { t.classList.remove('on'); });
      const tabEl = document.querySelector('.cat-tab[data-cat="' + urlTab + '"]');
      if (tabEl) { tabEl.classList.add('on'); curCat = urlTab; }
    }

    const { data, error } = await sb.from('products').select('*').eq('is_active', true).order('sort_order', { ascending: true });
    if (error) throw error;
    allProds = data || [];
    renderProds();
  } catch(e) {
    document.getElementById('prodGrid').innerHTML =
      '<div class="empty-msg"><p style="font-size:32px;margin-bottom:10px">⚠️</p>' +
      '<p style="font-size:14px;margin-bottom:6px">상품을 불러올 수 없습니다</p>' +
      '<p style="font-size:11px;color:#ff453a">' + (e.message||'') + '</p></div>';
  }
}

init();
</script>
