<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>관리자 - SE글로벌 렌탈</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#2563EB;--pd:#1D4ED8;--text:#1E293B;--sub:#64748B;--bg:#F1F5F9;--card:#fff;--border:#E2E8F0;--green:#10B981;--red:#EF4444;--sw:220px}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text)}
/* Login */
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center}
.lcard{background:var(--card);border-radius:20px;padding:40px;width:360px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.llogo{font-size:24px;font-weight:900;color:var(--primary);text-align:center;margin-bottom:8px}
.lsub{text-align:center;color:var(--sub);font-size:14px;margin-bottom:32px}
.linput{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;font-size:15px;margin-bottom:12px;outline:none}
.linput:focus{border-color:var(--primary)}
.lbtn{width:100%;background:var(--primary);color:#fff;padding:13px;border-radius:10px;font-size:15px;font-weight:800;border:none;cursor:pointer}
.lerr{color:var(--red);font-size:13px;text-align:center;margin-top:8px}
/* Layout */
.al{display:flex;min-height:100vh}
.sb{width:var(--sw);background:var(--pd);color:#fff;position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;z-index:50;transition:transform .3s}
.sblogo{padding:24px 20px;font-size:18px;font-weight:800;border-bottom:1px solid rgba(255,255,255,.1)}
.sblogo span{opacity:.7;font-size:12px;display:block;margin-top:2px}
.sbmenu{flex:1;padding:12px 0}
.mi{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;font-size:14px;font-weight:600;transition:background .15s;border-left:3px solid transparent}
.mi:hover{background:rgba(255,255,255,.1)}
.mi.on{background:rgba(255,255,255,.15);border-left-color:#fff}
.sbfoot{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1)}
.lout{width:100%;background:rgba(255,255,255,.1);color:#fff;border:none;border-radius:8px;padding:10px;cursor:pointer;font-size:13px;font-weight:700}
.mc{margin-left:var(--sw);flex:1;padding:24px;min-width:0}
/* Stats */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.scard{background:var(--card);border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.slbl{font-size:12px;color:var(--sub);margin-bottom:6px}
.sval{font-size:28px;font-weight:900;color:var(--primary)}
/* Section Card */
.sc{background:var(--card);border-radius:16px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.sch{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.sct{font-size:16px;font-weight:800}
.btnp{background:var(--primary);color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;border:none;cursor:pointer}
.bsm{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:700;border:none;cursor:pointer}
.be{background:#EFF6FF;color:var(--primary)}.bd{background:#FEF2F2;color:var(--red)}
/* Table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:10px 12px;font-size:12px;font-weight:700;color:var(--sub);background:var(--bg);border-bottom:1px solid var(--border)}
.tbl td{padding:12px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.sbadge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
.sp{background:#FEF3C7;color:#92400E}.sc2{background:#DBEAFE;color:#1D4ED8}.sd{background:#D1FAE5;color:#065F46}
/* Form */
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.fg{display:flex;flex-direction:column;gap:6px}
.fg.full{grid-column:1/-1}
.fl{font-size:12px;font-weight:700;color:var(--sub)}
.fi{border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;outline:none;transition:border-color .2s;width:100%;background:#fff}
.fi:focus{border-color:var(--primary)}
.fta{min-height:80px;resize:vertical}
.factions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.bcancel{background:var(--bg);color:var(--text);padding:10px 20px;border-radius:8px;font-size:14px;font-weight:700;border:none;cursor:pointer}
.bsave{background:var(--primary);color:#fff;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:700;border:none;cursor:pointer}
/* Image Upload */
.iupload{border:2px dashed var(--border);border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:border-color .2s}
.iupload:hover{border-color:var(--primary)}
.ipgrid{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.ipitem{position:relative;width:80px;height:80px;border-radius:8px;overflow:hidden;border:2px solid var(--border)}
.ipitem.main{border-color:var(--primary)}
.ipitem img{width:100%;height:100%;object-fit:cover}
.ipactions{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;flex-direction:column;gap:2px;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.ipitem:hover .ipactions{opacity:1}
.ipbtn{background:rgba(255,255,255,.9);border:none;border-radius:4px;padding:3px 6px;font-size:10px;font-weight:700;cursor:pointer;width:64px}
/* Spec rows */
.specrow{display:grid;grid-template-columns:1fr 1fr 32px;gap:8px;align-items:center;margin-bottom:8px}
.specrow input{padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:#fff;font-size:12px;width:100%}
.delbtn{width:28px;height:28px;background:#FEF2F2;border:none;border-radius:6px;cursor:pointer;color:var(--red);font-size:14px}
/* Toggle */
.tog{position:relative;width:40px;height:22px;background:#CBD5E1;border-radius:11px;cursor:pointer;transition:background .2s}
.tog.on{background:var(--green)}
.tog::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s}
.tog.on::after{left:21px}
/* Pages */
.page{display:none}.page.on{display:block}
/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#1E293B;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;transform:translateY(100px);opacity:0;transition:all .3s;z-index:1000}
.toast.on{transform:translateY(0);opacity:1}
.toast.ok{background:var(--green)}.toast.err{background:var(--red)}
/* Mobile */
.mbar{display:none;position:sticky;top:0;z-index:30;background:var(--pd);color:#fff;padding:0 16px;height:56px;align-items:center;justify-content:space-between}
.ham{font-size:24px;cursor:pointer}
.sbov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40}
.hidden{display:none!important}
@media(max-width:768px){.sb{transform:translateX(-100%)}.sb.on{transform:translateX(0)}.mc{margin-left:0}.mbar{display:flex}.fg2{grid-template-columns:1fr}.sgrid{grid-template-columns:1fr 1fr}}
</style>
</head>

<script>
let vehicles=[],consults=[],eImgs=[];

// ── Auth ──
function doLogin(){
  if(document.getElementById('lpw').value===ADMIN_PW){
    sessionStorage.setItem('sg_admin','1');
    document.getElementById('loginPage').style.display='none';
    document.getElementById('adminLayout').classList.remove('hidden');
    document.getElementById('ddate').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
    loadAll();
  } else {
    document.getElementById('lerr').textContent='비밀번호가 올바르지 않습니다';
  }
}
function logout(){sessionStorage.removeItem('sg_admin');location.reload();}
if(sessionStorage.getItem('sg_admin')){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('adminLayout').classList.remove('hidden');
  document.getElementById('ddate').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
  loadAll();
}

// ── Nav ──
function showPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.mi').forEach(m=>m.classList.remove('on'));
  document.getElementById('page-'+id).classList.add('on');
  if(el)el.classList.add('on');
  if(window.innerWidth<=768)closeSb();
}
function toggleSb(){
  const s=document.getElementById('sidebar'),o=document.getElementById('sbov');
  if(s.classList.contains('on')){s.classList.remove('on');o.classList.add('hidden');}
  else{s.classList.add('on');o.classList.remove('hidden');}
}
function closeSb(){document.getElementById('sidebar').classList.remove('on');document.getElementById('sbov').classList.add('hidden');}

// ── Load All ──
async function loadAll(){await Promise.all([loadVehicles(),loadConsults(),loadSite()]);}

// ── Vehicles ──
async function loadVehicles(){
  try{
    const {data,error}=await sba.from('vehicles').select('*').order('sort_order',{ascending:true});
    if(error)throw error;
    vehicles=data||[];
    renderVList();
    document.getElementById('sv1').textContent=vehicles.length;
  }catch(e){toast('차량 로드 실패','err');console.error(e);}
}

function renderVList(){
  const el=document.getElementById('vlist');
  if(!vehicles.length){el.innerHTML='<p style="text-align:center;color:#94A3B8;padding:40px">등록된 차량이 없습니다</p>';return;}
  el.innerHTML=`<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>이미지</th><th>ID</th><th>차량명</th><th>종류</th><th>렌탈</th><th>표시</th><th>관리</th></tr></thead><tbody>${
    vehicles.map(v=>{
      const imgs=parseImgs(v.images);
      const main=imgs.find(i=>i.is_main)||imgs[0];
      const imgH=main?`<img src="${main.url}" style="width:48px;height:48px;border-radius:6px;object-fit:cover" onerror="this.style.display='none'">`:'<span style="font-size:24px">🛵</span>';
      return `<tr>
        <td>${imgH}</td>
        <td><code style="font-size:11px">${v.id}</code></td>
        <td style="font-weight:700">${v.name}</td>
        <td>${v.type==='electric'?'⚡ 전기':'⛽ 내연'}</td>
        <td>${v.rental_price||'-'}</td>
        <td><div class="tog ${v.is_active?'on':''}" onclick="toggleV('${v.id}',${v.is_active})"></div></td>
        <td style="display:flex;gap:6px">
          <button class="bsm be" onclick="editV('${v.id}')">수정</button>
          <button class="bsm bd" onclick="deleteV('${v.id}')">삭제</button>
        </td>
      </tr>`;
    }).join('')
  }</tbody></table></div>`;
}

function parseImgs(raw){
  if(!raw)return[];
  if(Array.isArray(raw))return raw;
  try{return JSON.parse(raw);}catch(e){return[];}
}
function parseSpecs(raw){
  if(!raw)return{};
  if(typeof raw==='object'&&!Array.isArray(raw))return raw;
  try{return JSON.parse(raw);}catch(e){return{};}
}

function showVForm(v=null){
  document.getElementById('vlist-view').style.display='none';
  document.getElementById('vform-view').style.display='block';
  document.getElementById('vftitle').textContent=v?'차량 수정':'차량 추가';
  document.getElementById('eid').value=v?v.id:'';
  document.getElementById('vid').value=v?v.id:'';
  document.getElementById('vid').disabled=!!v; // ID는 수정 불가
  document.getElementById('vname2').value=v?v.name:'';
  document.getElementById('vtype2').value=v?v.type||'gasoline':'gasoline';
  document.getElementById('vtag2').value=v?v.tagline||'':'';
  document.getElementById('vdesc').value=v?v.description||'':'';
  document.getElementById('vrental').value=v?v.rental_price||'':'';
  document.getElementById('vlease').value=v?v.lease_price||'':'';

  document.getElementById('vbadge2').value=v?v.badge||'':'';
  document.getElementById('vsort').value=v?v.sort_order||0:0;
  // specs
  document.getElementById('specrows').innerHTML='';
  const specs=parseSpecs(v?v.specs:{});
  Object.entries(specs).forEach(([k,val])=>addSpec(k,val));
  // images
  eImgs=parseImgs(v?v.images:[]);
  renderImgs();
}
function hideVForm(){
  document.getElementById('vlist-view').style.display='block';
  document.getElementById('vform-view').style.display='none';
}
function editV(id){showVForm(vehicles.find(v=>v.id===id));}
async function deleteV(id){
  if(!confirm('정말 삭제하시겠습니까?'))return;
  const{error}=await sba.from('vehicles').delete().eq('id',id);
  if(error){toast('삭제 실패','err');}else{toast('삭제됐습니다','ok');loadVehicles();}
}
async function toggleV(id,cur){
  await sba.from('vehicles').update({is_active:!cur}).eq('id',id);
  loadVehicles();
}

function addSpec(k='',v=''){
  const row=document.createElement('div');row.className='specrow';
  row.innerHTML=`<input placeholder="항목 (예: 최고속도)" value="${k}"><input placeholder="값 (예: 60km/h)" value="${v}"><button class="delbtn" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById('specrows').appendChild(row);
}

async function saveVehicle(){
  const id=document.getElementById('vid').value.trim();
  const name=document.getElementById('vname2').value.trim();
  if(!id||!name){toast('ID와 차량명은 필수입니다','err');return;}
  // collect specs
  const specs={};
  document.querySelectorAll('.specrow').forEach(r=>{
    const inputs=r.querySelectorAll('input');
    const k=inputs[0].value.trim(),v=inputs[1].value.trim();
    if(k&&v)specs[k]=v;
  });
  const payload={
    name,
    
    type:document.getElementById('vtype2').value,
    tagline:document.getElementById('vtag2').value.trim()||null,
    description:document.getElementById('vdesc').value.trim()||null,
    rental_price:document.getElementById('vrental').value.trim()||null,
    lease_price:document.getElementById('vlease').value.trim()||null,

    badge:document.getElementById('vbadge2').value.trim()||null,
    sort_order:parseInt(document.getElementById('vsort').value)||0,
    specs:specs,
    images:eImgs,
  };
  const editingId=document.getElementById('eid').value;
  let error;
  if(editingId){
    ({error}=await sba.from('vehicles').update(payload).eq('id',editingId));
  }else{
    payload.id=id;
    ({error}=await sba.from('vehicles').insert([payload]));
  }
  if(error){toast('저장 실패: '+error.message,'err');console.error(error);}
  else{toast('저장됐습니다','ok');hideVForm();loadVehicles();}
}

// ── Image Upload ──
async function handleUpload(input){
  const files=Array.from(input.files);
  if(!files.length)return;
  for(const file of files){
    const ext=file.name.split('.').pop().toLowerCase();
    const path=`vehicles/${Date.now()}-${Math.random().toString(36).substr(2,6)}.${ext}`;
    const{error}=await sba.storage.from('vehicle-images').upload(path,file,{contentType:file.type,upsert:true});
    if(error){toast('업로드 실패: '+error.message,'err');console.error(error);continue;}
    const{data}=sba.storage.from('vehicle-images').getPublicUrl(path);
    eImgs.push({url:data.publicUrl,path,is_main:eImgs.length===0});
  }
  renderImgs();
  input.value='';
}
function renderImgs(){
  document.getElementById('ipgrid').innerHTML=eImgs.map((img,i)=>`
    <div class="ipitem ${img.is_main?'main':''}">
      <img src="${img.url}" alt="" onerror="this.src=''">
      <div class="ipactions">
        <button class="ipbtn" onclick="setMain(${i})" style="${img.is_main?'background:#2563EB;color:#fff':''}">${img.is_main?'✓ 메인':'메인 설정'}</button>
        <button class="ipbtn" onclick="removeImg(${i})" style="background:#EF4444;color:#fff">삭제</button>
      </div>
    </div>`).join('');
}
function setMain(i){eImgs.forEach((img,j)=>img.is_main=(j===i));renderImgs();}
async function removeImg(i){
  const img=eImgs[i];
  if(img.path)await sba.storage.from('vehicle-images').remove([img.path]);
  eImgs.splice(i,1);
  if(eImgs.length&&!eImgs.find(x=>x.is_main))eImgs[0].is_main=true;
  renderImgs();
}

// ── Consult ──
async function loadConsults(){
  try{
    const{data,error}=await sba.from('consult_requests').select('*').order('created_at',{ascending:false});
    if(error)throw error;
    consults=data||[];
    renderConsults();
    document.getElementById('sv2').textContent=consults.length;
    document.getElementById('sv3').textContent=consults.filter(c=>c.status==='pending').length;
    document.getElementById('sv4').textContent=consults.filter(c=>c.status==='done').length;
    renderRecentC();
  }catch(e){console.error(e);}
}
function renderConsults(){
  const tb=document.getElementById('ctbody');
  if(!consults.length){tb.innerHTML='<tr><td colspan="8" style="text-align:center;padding:40px;color:#94A3B8">상담 내역이 없습니다</td></tr>';return;}
  tb.innerHTML=consults.map(c=>`<tr>
    <td style="font-size:11px;white-space:nowrap">${new Date(c.created_at).toLocaleDateString('ko-KR')}<br>${new Date(c.created_at).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}</td>
    <td style="font-weight:700">${c.name}</td>
    <td><a href="tel:${c.phone}" style="color:var(--primary)">${c.phone}</a></td>
    <td>${c.region||'-'}</td>
    <td>${c.vehicle_name||'-'}</td>
    <td>${c.consult_type==='rental'?'렌탈':c.consult_type==='lease'?'리스':'렌탈·리스'}</td>
    <td>
      <select class="sbadge ${c.status==='pending'?'sp':c.status==='contacted'?'sc2':'sd'}" onchange="updateStatus(${c.id},this.value,this)" style="border:none;background:inherit;cursor:pointer;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px">
        <option value="pending" ${c.status==='pending'?'selected':''}>미처리</option>
        <option value="contacted" ${c.status==='contacted'?'selected':''}>연락완료</option>
        <option value="done" ${c.status==='done'?'selected':''}>처리완료</option>
      </select>
    </td>
    <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--sub);font-size:12px">${c.message||'-'}</td>
  </tr>`).join('');
}
function renderRecentC(){
  const el=document.getElementById('recentC');
  const r=consults.slice(0,5);
  if(!r.length){el.innerHTML='<p style="text-align:center;color:#94A3B8;padding:24px">상담 내역이 없습니다</p>';return;}
  el.innerHTML=`<table class="tbl"><thead><tr><th>일시</th><th>이름</th><th>연락처</th><th>차종</th><th>상태</th></tr></thead><tbody>${r.map(c=>`<tr><td style="font-size:11px">${new Date(c.created_at).toLocaleDateString('ko-KR')}</td><td style="font-weight:700">${c.name}</td><td>${c.phone}</td><td>${c.vehicle_name||'-'}</td><td><span class="sbadge ${c.status==='pending'?'sp':c.status==='contacted'?'sc2':'sd'}">${c.status==='pending'?'미처리':c.status==='contacted'?'연락완료':'처리완료'}</span></td></tr>`).join('')}</tbody></table>`;
}
async function updateStatus(id,status,sel){
  const{error}=await sba.from('consult_requests').update({status}).eq('id',id);
  if(error){toast('변경 실패','err');}else{toast('상태 변경됐습니다','ok');sel.className=`sbadge ${status==='pending'?'sp':status==='contacted'?'sc2':'sd'}`;loadConsults();}
}

// ── Site ──
async function loadSite(){
  try{
    const{data:rows}=await sba.from('site_config').select('*').eq('id',1).limit(1);
    const s=rows&&rows.length?rows[0]:null;
    if(!s)return;
    document.getElementById('sname').value=s.site_name||'';
    document.getElementById('sphone').value=s.phone||'';
    document.getElementById('skakao').value=s.kakao_url||'';
    document.getElementById('sbizname').value=s.business_name||'';
    document.getElementById('sbiznum').value=s.business_number||'';
    document.getElementById('saddr').value=s.address||'';
    document.getElementById('snotice').value=s.notice||'';
  }catch(e){console.error(e);}
}
async function saveSite(){
  const payload={
    id:1,
    site_name:document.getElementById('sname').value||'SE글로벌 렌탈',
    phone:document.getElementById('sphone').value||null,
    kakao_url:document.getElementById('skakao').value||null,
    business_name:document.getElementById('sbizname').value||null,
    business_number:document.getElementById('sbiznum').value||null,
    address:document.getElementById('saddr').value||null,
    notice:document.getElementById('snotice').value||null,
    updated_at:new Date().toISOString()
  };
  const{error}=await sba.from('site_config').upsert(payload,{onConflict:'id'});
  if(error){toast('저장 실패: '+error.message,'err');console.error(error);}
  else{toast('저장됐습니다','ok');}
}

// ── Toast ──
function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast on ${type}`;
  setTimeout(()=>t.classList.remove('on'),2800);
}
</script>
