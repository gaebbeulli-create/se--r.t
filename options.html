<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>옵션 · 액세서리 | SE글로벌 렌탈 TEAMBRO</title>
<meta name="description" content="이륜차 렌탈 옵션 및 액세서리. 탑박스, 헬멧, 배터리 등 다양한 옵션을 제공합니다.">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--bg2:#141414;--bg3:#1c1c1e;--bg4:#2c2c2e;--border:#2c2c2e;--border2:#3a3a3c;--text:#f5f5f7;--text2:#a1a1a6;--text3:#6e6e73;--teal:#a3e635;--accent:#0a84ff}
html{scroll-behavior:smooth}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;padding-bottom:80px}
a{text-decoration:none;color:inherit}

/* Header */
header{background:rgba(10,10,10,.9);backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:100}
.hi{max-width:1100px;margin:0 auto;padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:52px}
.logo{display:flex;align-items:center}
.logo .se{color:#ff2d2d;font-weight:900;font-size:17px;font-style:italic}
.logo .gl{color:#fff;font-weight:900;font-size:17px}
.logo .x{color:rgba(255,255,255,.3);font-weight:300;font-size:13px;margin:0 6px}
.logo .tb{color:#00ffb3;font-weight:900;font-size:17px}
nav{display:flex;gap:20px}
nav a{font-size:13px;color:var(--text2);transition:color .15s}
nav a:hover,nav a.on{color:var(--text)}
.hcta{background:var(--teal);color:#0a0a0a;padding:7px 16px;border-radius:980px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit}

/* Page Hero */
.page-hero{
  text-align:center;padding:56px 22px 40px;
  background:var(--bg);position:relative;overflow:hidden;
}
.page-hero::before{content:'';position:absolute;top:-20%;left:50%;transform:translateX(-50%);width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(163,230,53,.05) 0%,transparent 60%);pointer-events:none}
.hero-eye{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--teal);margin-bottom:12px;display:block}
.page-hero h1{font-size:clamp(26px,5vw,48px);font-weight:900;letter-spacing:-1.5px;margin-bottom:12px}
.page-hero p{font-size:14px;color:var(--text2);max-width:480px;margin:0 auto}

/* Filter */
.filter-wrap{max-width:1100px;margin:0 auto;padding:20px 22px 28px;display:flex;gap:8px;flex-wrap:wrap}
.ftab{padding:7px 18px;border-radius:980px;font-size:12px;font-weight:600;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);transition:all .2s;flex-shrink:0}
.ftab:hover{border-color:var(--teal);color:var(--teal)}
.ftab.on{background:var(--teal);color:#0a0a0a;border-color:var(--teal)}

/* Options grid */
.options-wrap{max-width:1100px;margin:0 auto;padding:0 22px}
.options-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}

/* Option card */
.ocard{
  background:var(--bg2);border:0.5px solid var(--border);
  border-radius:16px;overflow:hidden;
  transition:transform .25s,box-shadow .25s,border-color .25s;
  cursor:pointer;
}
.ocard:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(0,0,0,.5);border-color:rgba(163,230,53,.3)}
.ocard-img{width:100%;aspect-ratio:4/3;overflow:hidden;background:var(--bg3);position:relative}
.ocard-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .4s}
.ocard:hover .ocard-img img{transform:scale(1.05)}
.ocard-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px}
.ocard-body{padding:14px 16px 16px}
.ocard-cat{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--teal);margin-bottom:5px}
.ocard-name{font-size:15px;font-weight:700;margin-bottom:3px;line-height:1.3}
.ocard-desc{font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.4}
.ocard-price{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:10px;border-top:0.5px solid var(--border2);
}
.ocard-price-val{font-size:17px;font-weight:800;color:var(--teal)}
.ocard-btn{
  background:var(--bg3);border:0.5px solid var(--border2);
  color:var(--text2);padding:5px 12px;border-radius:8px;
  font-size:11px;font-weight:600;cursor:pointer;
  transition:all .2s;font-family:inherit;
}
.ocard-btn:hover{background:var(--teal);color:#0a0a0a;border-color:var(--teal)}

/* Notice */
.options-notice{
  max-width:1100px;margin:24px auto 0;padding:0 22px;
}
.notice-box{
  background:rgba(255,214,10,.04);border:0.5px solid rgba(255,214,10,.12);
  border-radius:12px;padding:14px 18px;
  font-size:12px;color:var(--text3);line-height:1.7;
}

/* Bottom CTA */
.bottom-cta{background:linear-gradient(135deg,rgba(163,230,53,.07),rgba(10,132,255,.04));border-top:0.5px solid var(--border);margin-top:48px;padding:48px 22px;text-align:center}
.bottom-cta h2{font-size:clamp(20px,4vw,34px);font-weight:900;margin-bottom:10px;letter-spacing:-.5px}
.bottom-cta p{font-size:14px;color:var(--text2);margin-bottom:24px}
.bottom-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.bphone{background:var(--teal);color:#0a0a0a;padding:14px 28px;border-radius:980px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit}
.bkakao{background:#FEE500;color:#1a1a00;padding:14px 28px;border-radius:980px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit}

/* Empty / Loading */
.loading{text-align:center;padding:80px;color:var(--text3);grid-column:1/-1}
.spin{width:24px;height:24px;border:1.5px solid var(--border2);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Mobile CTA */
.mcta{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,.92);backdrop-filter:blur(20px);border-top:0.5px solid var(--border);padding:10px 16px;z-index:200;grid-template-columns:1fr 1fr;gap:8px}
.mb{padding:13px;border-radius:12px;font-size:14px;font-weight:700;text-align:center;border:none;cursor:pointer;font-family:inherit}
.mp{background:var(--teal);color:#0a0a0a}
.mk{background:#FEE500;color:#1d1d1f}

/* Anim */
.anim{opacity:0;transform:translateY(20px);transition:opacity .5s ease,transform .5s ease}
.anim.in{opacity:1;transform:translateY(0)}

@media(max-width:768px){.options-grid{grid-template-columns:repeat(2,1fr);gap:10px}body{padding-bottom:72px}.mcta{display:grid}}
@media(max-width:400px){.options-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<script>
const SB_URL='https://ogjrhphhpqpzlzlbugdp.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nanJocGhocHFwemx6bGJ1Z2RwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2Mjc4MzUsImV4cCI6MjA4OTIwMzgzNX0.tdVzi9swRk_sKbNqFvIMg30q5XcgDXRfVJitPNCFRA8';
const sb=supabase.createClient(SB_URL,SB_KEY);
</script>

<header>
  <div class="hi">
    <a href="index.html" class="logo"><span class="se">SE</span><span class="gl">GLOBAL</span><span class="x">×</span><span class="tb">TEAMBRO</span></a>
    <nav>
      <a href="models.html">모델</a>
      <a href="options.html" class="on">옵션</a>
      <a href="service.html">서비스</a>
      <a href="index.html#consult">상담</a>
    </nav>
    <button class="hcta" id="headerPhone">📞 상담</button>
  </div>
</header>

<div class="page-hero">
  <span class="hero-eye">Options & Accessories</span>
  <h1>옵션 · 액세서리</h1>
  <p>차량과 함께하면 더 편리한<br>다양한 옵션을 만나보세요</p>
</div>

<div class="filter-wrap" id="filterWrap">
  <div class="ftab on" onclick="filterOptions('all',this)">전체</div>
</div>

<div class="options-wrap">
  <div class="options-grid" id="optionsGrid">
    <div class="loading"><div class="spin"></div>불러오는 중...</div>
  </div>
</div>

<div class="options-notice">
  <div class="notice-box">
    ※ 모든 가격은 부가세 포함 가격입니다.<br>
    ※ 옵션 구매 및 설치 문의는 전화 또는 카카오톡 고객센터로 연락주세요.<br>
    ※ 재고 상황에 따라 일부 옵션의 배송이 지연될 수 있습니다.
  </div>
</div>

<div class="bottom-cta">
  <h2>옵션 문의 · 설치 상담</h2>
  <p>원하는 옵션이 없거나 설치 문의가 있으시면 연락주세요</p>
  <div class="bottom-btns">
    <button class="bphone" id="ctaPhone">📞 전화 상담</button>
    <button class="bkakao" id="ctaKakao">💬 카카오톡 상담</button>
  </div>
</div>

<div class="mcta">
  <button class="mb mp" id="mPhone">📞 전화 상담</button>
  <button class="mb mk" id="mKakao">💬 카카오톡</button>
</div>

<script>
let allOptions=[];
let curFilter='all';
let sitePhone='';

const catLabels={
  'battery':'배터리',
  'storage':'수납·탑박스',
  'safety':'안전용품',
  'comfort':'편의용품',
  'accessory':'액세서리',
  'helmet':'헬멧',
  'other':'기타'
};
const catIcons={
  'battery':'🔋','storage':'📦','safety':'🦺',
  'comfort':'🛡️','accessory':'⚙️','helmet':'⛑️','other':'🔧'
};

function filterOptions(cat,el){
  curFilter=cat;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  renderOptions();
}

function buildFilters(options){
  const cats=[...new Set(options.map(o=>o.category||'other'))];
  const wrap=document.getElementById('filterWrap');
  cats.forEach(cat=>{
    const btn=document.createElement('div');
    btn.className='ftab';
    btn.textContent=`${catIcons[cat]||'🔧'} ${catLabels[cat]||cat}`;
    btn.onclick=()=>filterOptions(cat,btn);
    wrap.appendChild(btn);
  });
}

function renderOptions(){
  const filtered=curFilter==='all'?allOptions:allOptions.filter(o=>o.category===curFilter);
  const grid=document.getElementById('optionsGrid');
  if(!filtered.length){
    grid.innerHTML='<p style="color:var(--text3);font-size:14px;padding:60px 0;text-align:center;grid-column:1/-1">해당 옵션이 없습니다</p>';
    return;
  }
  grid.innerHTML=filtered.map((o,i)=>{
    const price=o.price?o.price.toLocaleString()+'원':'문의';
    const imgHtml=o.image_url
      ?`<img src="${o.image_url}" alt="${o.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=ocard-img-ph>${catIcons[o.category]||'🔧'}</div>'">`
      :`<div class="ocard-img-ph">${catIcons[o.category||'other']||'🔧'}</div>`;
    return `<div class="ocard anim" style="transition-delay:${i*0.04}s">
      <div class="ocard-img">${imgHtml}</div>
      <div class="ocard-body">
        <div class="ocard-cat">${catLabels[o.category||'other']||o.category||'액세서리'}</div>
        <div class="ocard-name">${o.name}</div>
        <div class="ocard-desc">${o.description||''}</div>
        <div class="ocard-price">
          <span class="ocard-price-val">+ ${price}</span>
          <button class="ocard-btn" onclick="consultOption('${o.name}')">문의하기</button>
        </div>
      </div>
    </div>`;
  }).join('');

  setTimeout(()=>{
    const obs=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('in');});},{threshold:.1});
    document.querySelectorAll('.anim:not(.in)').forEach(el=>obs.observe(el));
  },50);
}

function consultOption(name){
  const msg=encodeURIComponent(`${name} 옵션 문의드립니다.`);
  if(sitePhone)location.href='tel:'+sitePhone;
}

async function init(){
  try{
    const{data:rows}=await sb.from('site_config').select('phone,kakao_url').eq('id',1).limit(1);
    const s=rows&&rows.length?rows[0]:null;
    if(s){
      if(s.phone){
        sitePhone=s.phone;
        ['headerPhone','ctaPhone','mPhone'].forEach(id=>{const el=document.getElementById(id);if(el)el.onclick=()=>location.href='tel:'+s.phone;});
        document.getElementById('mPhone').textContent='📞 '+s.phone;
      }
      if(s.kakao_url){
        ['ctaKakao','mKakao'].forEach(id=>{const el=document.getElementById(id);if(el)el.onclick=()=>window.open(s.kakao_url,'_blank');});
      }
    }
  }catch(e){}

  try{
    const{data,error}=await sb.from('options').select('*').eq('is_active',true).order('sort_order',{ascending:true});
    if(error)throw error;
    allOptions=data||[];
    if(allOptions.length){
      buildFilters(allOptions);
      renderOptions();
    } else {
      document.getElementById('optionsGrid').innerHTML='<p style="color:var(--text3);font-size:14px;padding:80px 0;text-align:center;grid-column:1/-1">등록된 옵션이 없습니다<br><span style="font-size:12px;margin-top:8px;display:block">어드민에서 옵션을 추가해주세요</span></p>';
    }
  }catch(e){
    document.getElementById('optionsGrid').innerHTML='<p style="color:var(--text3);font-size:14px;padding:80px 0;text-align:center;grid-column:1/-1">옵션 정보를 불러올 수 없습니다</p>';
  }
}
init();
</script>
</body>
